<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicopoker — Plataforma del Programa</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8312A;--red-h:#FF3D35;--red-dim:rgba(232,49,42,.12);--red-glow:rgba(232,49,42,.25);
  --bg:#000;--bg2:#0A0A0A;--bg3:#111;--card:#141414;--card2:#1A1A1A;
  --border:rgba(255,255,255,.07);--border-r:rgba(232,49,42,.3);
  --text:#fff;--muted:rgba(255,255,255,.55);--dim:rgba(255,255,255,.28);
  --green:#22C55E;--sw:280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;line-height:1.6;}
input,button,textarea,select{font-family:'Montserrat',sans-serif;}
button{cursor:pointer;}a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}

/* APP */
#app{height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;flex-direction:column;}

/* TOP NAV */
.tnav{
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;background:rgba(0,0,0,.96);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:50;gap:1rem;
}
.tnav-logo img{height:26px;width:auto;display:block;}
.tnav-right{display:flex;align-items:center;gap:.75rem;}
.uav{width:30px;height:30px;border-radius:50%;background:var(--red-dim);border:1px solid var(--border-r);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--red);}
.uname{font-size:.75rem;font-weight:600;color:var(--muted);max-width:140px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:.3rem .75rem;border-radius:3px;transition:all .2s;}
.btn-sm:hover{border-color:var(--red);color:var(--red);}
.btn-back{display:flex;align-items:center;gap:.35rem;background:transparent;border:none;
  color:var(--muted);font-size:.75rem;font-weight:600;transition:color .2s;padding:0;}
.btn-back:hover{color:#fff;}
.btn-back svg{transition:transform .2s;}
.btn-back:hover svg{transform:translateX(-2px);}

/* ── LOGIN ── */
#vlogin{align-items:center;justify-content:center;position:relative;}
#vlogin::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 40% at 50% 0%,rgba(232,49,42,.07),transparent 70%);pointer-events:none;}
.lbox{background:var(--card);border:1px solid var(--border);padding:2.5rem 2.25rem;
  width:100%;max-width:400px;position:relative;z-index:1;}
.llogo{display:flex;justify-content:center;margin-bottom:1.75rem;}
.llogo img{height:32px;}
.ltitle{font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:.3rem;}
.lsub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:1.75rem;}
.fgroup{margin-bottom:1.1rem;}
.flabel{display:block;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.4rem;}
.finput{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  font-size:.88rem;padding:.7rem .9rem;outline:none;transition:border-color .2s;border-radius:3px;}
.finput:focus{border-color:var(--red);}
.finput::placeholder{color:var(--dim);}
.btn-login{width:100%;background:var(--red);color:#fff;border:none;
  font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:.85rem;border-radius:3px;transition:background .2s,transform .15s;margin-top:.4rem;}
.btn-login:hover{background:var(--red-h);transform:translateY(-1px);}
.lerr{background:rgba(232,49,42,.12);border:1px solid var(--border-r);color:#ff7070;
  font-size:.75rem;padding:.55rem .9rem;border-radius:3px;margin-bottom:.9rem;display:none;}
.lerr.show{display:block;}

/* ── DASHBOARD ── */
#vdash{overflow-y:auto;}
.dash-hdr{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border);}
.dash-hdr h1{font-size:1.35rem;font-weight:800;margin-bottom:.2rem;}
.dash-hdr p{font-size:.82rem;color:var(--muted);}
.overall-prog{margin-top:.9rem;}
.op-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;max-width:300px;}
.op-fill{height:100%;background:var(--red);border-radius:2px;transition:width .6s;}
.op-label{font-size:.67rem;color:var(--muted);margin-top:.3rem;}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.1rem;padding:1.4rem 2rem 2.5rem;}

/* Unit card */
.ucard{background:var(--card);border:1px solid var(--border);overflow:hidden;cursor:pointer;
  transition:border-color .25s,transform .25s;}
.ucard:hover{border-color:var(--border-r);transform:translateY(-3px);}
.ucard-cover{height:110px;display:flex;align-items:flex-end;padding:.9rem;position:relative;overflow:hidden;}
.ucard-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 55%);}
.ubadge{font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:#fff;padding:.18rem .55rem;border-radius:2px;position:relative;z-index:1;}
.ubadge-num{background:var(--red);}
.ubadge-bv{background:#333;}
.ucard-body{padding:1.1rem 1.1rem .9rem;}
.uctitle{font-size:.95rem;font-weight:800;margin-bottom:.25rem;letter-spacing:-.01em;}
.ucdesc{font-size:.75rem;color:var(--muted);line-height:1.55;margin-bottom:.9rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ucfoot{display:flex;align-items:center;gap:.9rem;}
.upwrap{flex:1;}
.upbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.upfill{height:100%;background:var(--green);border-radius:2px;transition:width .5s;}
.uppct{font-size:.65rem;font-weight:700;margin-top:.25rem;}
.uppct.done{color:var(--green);}
.uppct.prog{color:var(--muted);}
.btn-uc{font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:.4rem .9rem;border-radius:3px;border:none;white-space:nowrap;transition:background .2s;flex-shrink:0;}
.btn-uc-start{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.btn-uc-start:hover{background:var(--card2);color:#fff;}
.btn-uc-cont{background:var(--red);color:#fff;}
.btn-uc-cont:hover{background:var(--red-h);}
.btn-uc-done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}

/* ── CLASSROOM ── */
#vcls{flex-direction:row;overflow:hidden;}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.shdr{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.shdr-title{font-size:.82rem;font-weight:800;margin-bottom:.5rem;line-height:1.35;letter-spacing:-.01em;}
.spbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.spfill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.sppct{font-size:.63rem;font-weight:700;color:var(--green);margin-top:.25rem;}
.slessons{flex:1;overflow-y:auto;padding:.35rem 0;}
.sseclabel{font-size:.57rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);padding:.6rem 1.1rem .2rem;}
.sitem{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem 1.1rem;cursor:pointer;
  transition:background .15s;border-left:2px solid transparent;position:relative;}
.sitem:hover{background:rgba(255,255,255,.03);}
.sitem.active{background:rgba(232,49,42,.09);border-left-color:var(--red);}
.sck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--dim);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;}
.sck.done{background:var(--green);border-color:var(--green);}
.sck svg{display:none;}
.sck.done svg{display:block;}
.stitle{font-size:.75rem;color:var(--muted);line-height:1.35;flex:1;}
.sitem.active .stitle{color:#fff;font-weight:600;}

/* MAIN */
.mcontent{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.mhdr{padding:1.5rem 1.75rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.mhdr-title{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;}
.mbody{padding:1.5rem 1.75rem;flex:1;}

/* Video */
.vwrap{background:var(--bg3);border:1px solid var(--border);margin-bottom:1.5rem;
  overflow:hidden;border-radius:4px;}
.vembed{position:relative;padding-bottom:56.25%;height:0;}
.vembed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.vph{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d0d0d,#181818);gap:.6rem;color:var(--dim);}
.vph-icon{font-size:2.5rem;opacity:.25;}
.vph p{font-size:.75rem;font-weight:600;letter-spacing:.05em;}
.vph small{font-size:.65rem;opacity:.6;text-align:center;max-width:260px;line-height:1.5;}

/* Resources */
.rsec{margin-bottom:1.5rem;}
.rsec-title{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);padding-bottom:.5rem;border-bottom:1px solid var(--border);margin-bottom:.65rem;}
.ritem{display:inline-flex;align-items:center;gap:.5rem;background:var(--card2);
  border:1px solid var(--border);padding:.5rem .9rem;border-radius:3px;
  margin-right:.5rem;margin-bottom:.5rem;font-size:.75rem;font-weight:600;color:var(--muted);
  cursor:pointer;transition:border-color .2s,color .2s;}
.ritem:hover{border-color:var(--red);color:#fff;}
.ritem-icon{color:var(--red);font-size:.8rem;}

/* Session box */
.sbox{background:var(--card2);border:1px solid var(--border-r);border-top:2px solid var(--red);
  padding:1.75rem;margin-bottom:1.5rem;text-align:center;}
.sbox h3{font-size:1rem;font-weight:800;margin-bottom:.4rem;}
.sbox p{font-size:.82rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;}
.btn-ses{display:inline-flex;align-items:center;gap:.45rem;background:var(--red);color:#fff;
  border:none;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:.8rem 1.75rem;border-radius:3px;transition:background .2s;text-decoration:none;}
.btn-ses:hover{background:var(--red-h);}

/* Note */
.note{background:rgba(232,49,42,.06);border-left:3px solid var(--red);
  padding:.9rem 1.1rem;margin-bottom:1.5rem;border-radius:0 3px 3px 0;}
.note p{font-size:.8rem;color:var(--muted);line-height:1.7;}

/* Complete row */
.crow{display:flex;align-items:center;justify-content:space-between;
  gap:.9rem;padding:1.25rem 0;border-top:1px solid var(--border);flex-wrap:wrap;margin-top:.5rem;}
.btn-cmp{display:flex;align-items:center;gap:.45rem;background:transparent;
  border:1px solid var(--green);color:var(--green);font-size:.73rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:.6rem 1.25rem;border-radius:3px;transition:all .2s;}
.btn-cmp:hover,.btn-cmp.done{background:rgba(34,197,94,.12);}
.btn-cmp.done{opacity:.7;cursor:default;}
.btn-nxt{display:flex;align-items:center;gap:.45rem;background:var(--card2);
  border:1px solid var(--border);color:var(--muted);font-size:.73rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:.6rem 1.25rem;border-radius:3px;transition:all .2s;}
.btn-nxt:hover{border-color:var(--red);color:#fff;}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--green);color:#fff;font-size:.75rem;font-weight:700;
  padding:.65rem 1.25rem;border-radius:4px;
  opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}

/* Mobile */
.mob-toggle{display:none;background:transparent;border:none;color:var(--muted);padding:0;
  align-items:center;gap:.3rem;font-size:.72rem;font-weight:600;}
@media(max-width:800px){
  .sidebar{position:fixed;top:54px;left:0;bottom:0;z-index:40;
    transform:translateX(-100%);transition:transform .3s;}
  .sidebar.open{transform:translateX(0);}
  .mob-toggle{display:flex;}
  .ugrid{grid-template-columns:1fr;padding:1rem;}
  .mbody,.mhdr{padding:1rem;}
  .uname{display:none;}
}
</style>
</head>

}
function setLessonDone(lid) {
  const p = getProgress(); p[lid] = true;
  localStorage.setItem('pp_prog_' + state.user, JSON.stringify(p));
}
function isLessonDone(lid) { return !!getProgress()[lid]; }
function unitProgress(unit) {
  const all = [...(unit.lessons||[]), ...(unit.extra||[])];
  const done = all.filter(l => isLessonDone(l.id)).length;
  return { done, total: all.length, pct: all.length ? Math.round(done/all.length*100) : 0 };
}
function totalProgress() {
  let done=0, total=0;
  CURRICULUM.forEach(u => { const p=unitProgress(u); done+=p.done; total+=p.total; });
  return total ? Math.round(done/total*100) : 0;
}

// ═══════════════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════════════
function doLogin() {
  const u=document.getElementById('iu').value.trim().toLowerCase();
  const p=document.getElementById('ip').value;
  const user = USERS[u];
  if (!user || user.pass !== p) {
    document.getElementById('lerr').classList.add('show');
    document.getElementById('ip').value='';
    return;
  }
  state.user = u;
  localStorage.setItem('pp_session', u);
  showDash();
}
function doLogout() {
  state = { user:null, unitId:null, lessonId:null };
  localStorage.removeItem('pp_session');
  showView('vlogin');
  document.getElementById('iu').value='';
  document.getElementById('ip').value='';
  document.getElementById('lerr').classList.remove('show');
}
function tryAutoLogin() {
  const u = localStorage.getItem('pp_session');
  if (u && USERS[u]) { state.user=u; showDash(); }
}

// ═══════════════════════════════════════════════════════════════════════
//  VIEWS
// ═══════════════════════════════════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showDash() {
  const user = USERS[state.user];
  document.getElementById('nav-av').textContent = user.name[0].toUpperCase();
  document.getElementById('nav-av2').textContent = user.name[0].toUpperCase();
  document.getElementById('nav-name').textContent = user.name;
  document.getElementById('dash-greeting').textContent = 'Bienvenido, ' + user.name.split(' ')[0] + ' 👋';
  renderDash();
  showView('vdash');
}

function renderDash() {
  const pct = totalProgress();
  document.getElementById('op-fill').style.width = pct+'%';
  document.getElementById('op-label').textContent = pct + '% del programa completado';
  const grid = document.getElementById('ugrid');
  grid.innerHTML = CURRICULUM.map(u => {
    const p = unitProgress(u);
    const btnClass = p.pct===0 ? 'btn-uc-start' : p.pct===100 ? 'btn-uc-done' : 'btn-uc-cont';
    const btnTxt = p.pct===0 ? 'Empezar' : p.pct===100 ? '✓ Completada' : 'Continuar →';
    return \`<div class="ucard" onclick="openUnit('\${u.id}')">
      <div class="ucard-cover" style="background:linear-gradient(135deg, \${u.color}, #000);">
        <span class="ubadge \${u.number ? 'ubadge-num' : 'ubadge-bv'}">\${u.badge}</span>
      </div>
      <div class="ucard-body">
        <div class="uctitle">\${u.title}</div>
        <div class="ucdesc">\${u.desc}</div>
        <div class="ucfoot">
          <div class="upwrap">
            <div class="upbar"><div class="upfill" style="width:\${p.pct}%"></div></div>
            <div class="uppct \${p.pct===100?'done':'prog'}">\${p.pct}% completado</div>
          </div>
          <button class="btn-uc \${btnClass}">\${btnTxt}</button>
        </div>
      </div>
    </div>\`;
  }).join('');
}

function openUnit(uid) {
  const unit = CURRICULUM.find(u => u.id === uid);
  if (!unit) return;
  state.unitId = uid;
  // Find first incomplete lesson, or first lesson
  const all = [...(unit.lessons||[]), ...(unit.extra||[])];
  const first = all.find(l => !isLessonDone(l.id)) || all[0];
  openLesson(uid, first.id);
}

function openLesson(uid, lid) {
  state.unitId = uid;
  state.lessonId = lid;
  const unit = CURRICULUM.find(u => u.id === uid);
  renderSidebar(unit);
  renderContent(unit, lid);
  showView('vcls');
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function renderSidebar(unit) {
  const p = unitProgress(unit);
  document.getElementById('s-title').textContent = (unit.number ? 'Unidad '+unit.number+': ' : '') + unit.title;
  document.getElementById('s-prog').style.width = p.pct+'%';
  document.getElementById('s-pct').textContent = p.pct+'% completado';
  
  let html = '';
  (unit.lessons||[]).forEach(l => {
    const done = isLessonDone(l.id);
    const active = l.id === state.lessonId;
    html += lessonItem(l, done, active);
  });
  if (unit.extra && unit.extra.length) {
    html += \`<div class="sseclabel">Material extra</div>\`;
    unit.extra.forEach(l => {
      const done = isLessonDone(l.id);
      const active = l.id === state.lessonId;
      html += lessonItem(l, done, active);
    });
  }
  document.getElementById('s-lessons').innerHTML = html;
}

function lessonItem(l, done, active) {
  return \`<div class="sitem \${active?'active':''}" onclick="openLesson('\${state.unitId}','\${l.id}')">
    <div class="sck \${done?'done':''}">
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
        <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="stitle">\${l.title}</div>
  </div>\`;
}

function renderContent(unit, lid) {
  const allLessons = [...(unit.lessons||[]), ...(unit.extra||[])];
  const lesson = allLessons.find(l => l.id === lid);
  if (!lesson) return;
  
  const isDone = isLessonDone(lid);
  const idx = allLessons.indexOf(lesson);
  const next = allLessons[idx+1];
  
  document.getElementById('m-title').textContent = lesson.title;
  
  let body = '';
  
  // Video
  if (lesson.videoId !== undefined) {
    if (lesson.videoId) {
      body += \`<div class="vwrap"><div class="vembed">
        <iframe src="https://www.youtube.com/embed/\${lesson.videoId}?rel=0&modestbranding=1" allowfullscreen></iframe>
      </div></div>\`;
    } else {
      body += \`<div class="vwrap"><div class="vph">
        <div class="vph-icon">▶</div>
        <p>Video próximamente</p>
        <small>El video de esta lección será cargado en breve. Podés marcarla como completada para continuar.</small>
      </div></div>\`;
    }
  }
  
  // Note
  if (lesson.note) {
    body += \`<div class="note"><p>\${lesson.note}</p></div>\`;
  }
  
  // Resources
  if (lesson.resources && lesson.resources.length) {
    body += \`<div class="rsec"><div class="rsec-title">Recursos</div>\`;
    lesson.resources.forEach(r => {
      body += \`<a href="\${r.url}" target="_blank" class="ritem">
        <span class="ritem-icon">📎</span> \${r.name}
      </a>\`;
    });
    body += \`</div>\`;
  }
  
  // Session
  if (lesson.type === 'session') {
    body += \`<div class="sbox">
      <h3>Sesión 1 a 1 con tu psicólogo</h3>
      <p>Agendá tu sesión personalizada. Hacé clic en el botón para ver la disponibilidad y reservar tu espacio.</p>
      <a href="https://calendly.com/lucho-torres8/30min" target="_blank" class="btn-ses">
        📅 Agendar mi sesión
      </a>
    </div>\`;
  }
  
  // Complete row
  body += \`<div class="crow">
    <button class="btn-cmp \${isDone?'done':''}" id="btn-cmp" onclick="markDone('\${lid}')">
      \${isDone
        ? \`<svg width="13" height="10" viewBox="0 0 13 10"><path d="M1 5L4.5 8.5L12 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg> Completada\`
        : \`<svg width="13" height="10" viewBox="0 0 13 10"><path d="M1 5L4.5 8.5L12 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg> Marcar como completada\`
      }
    </button>
    \${next ? \`<button class="btn-nxt" onclick="openLesson('\${state.unitId}','\${next.id}')">
      Siguiente: \${next.title.length>35 ? next.title.substring(0,35)+'...' : next.title} →
    </button>\` : \`<button class="btn-nxt" onclick="showDash()">
      ← Volver al programa
    </button>\`}
  </div>\`;
  
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('mcontent').scrollTop = 0;
}

function markDone(lid) {
  setLessonDone(lid);
  showToast('¡Lección completada! 🎯');
  const unit = CURRICULUM.find(u => u.id === state.unitId);
  renderSidebar(unit);
  renderContent(unit, lid);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('ip').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('iu').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('ip').focus(); });
tryAutoLogin();
</script>
</body>
</html>
