<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicopoker — Plataforma</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8312A;--red-h:#FF3D35;--red-dim:rgba(232,49,42,.12);
  --bg:#18191F;--bg2:#1F2028;--bg3:#25262F;--card:#25262F;--card2:#2C2D38;
  --border:rgba(255,255,255,.08);--border-r:rgba(232,49,42,.28);
  --text:#EEEFF3;--muted:rgba(238,239,243,.56);--dim:rgba(238,239,243,.28);
  --green:#22C55E;--sw:282px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;line-height:1.6;}
input,button,textarea{font-family:'Montserrat',sans-serif;}
button{cursor:pointer;}a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:3px;}
#app{height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;flex-direction:column;}
.tnav{height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);z-index:50;gap:1rem;}
.tnav-logo img{height:26px;width:auto;display:block;}
.tnav-r{display:flex;align-items:center;gap:.65rem;}
.uav{width:30px;height:30px;border-radius:50%;background:var(--red-dim);border:1px solid var(--border-r);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--red);flex-shrink:0;}
.uname{font-size:.75rem;font-weight:600;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .7rem;border-radius:3px;transition:all .2s;}
.btn-sm:hover{border-color:var(--red);color:var(--red);}
.btn-back{display:flex;align-items:center;gap:.35rem;background:none;border:none;color:var(--muted);font-size:.75rem;font-weight:600;transition:color .2s;padding:0;}
.btn-back:hover{color:var(--text);}
.btn-back svg{transition:transform .2s;}
.btn-back:hover svg{transform:translateX(-2px);}
.mob-menu{display:none;align-items:center;gap:.4rem;background:none;border:none;color:var(--muted);font-size:.72rem;font-weight:600;padding:0;}
#vlogin{align-items:center;justify-content:center;position:relative;background:var(--bg);}
#vlogin::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 40% at 50% 5%,rgba(232,49,42,.06),transparent 65%);}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:2.5rem 2.25rem;width:100%;max-width:400px;position:relative;z-index:1;}
.llogo{display:flex;justify-content:center;margin-bottom:1.75rem;}
.llogo img{height:32px;}
.ltitle{font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:.3rem;line-height:1.3;}
.lsub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:1.75rem;}
.fgroup{margin-bottom:1.1rem;}
.flabel{display:block;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.finput{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:.88rem;padding:.7rem .9rem;outline:none;transition:border-color .2s;border-radius:4px;}
.finput:focus{border-color:var(--red);}
.finput::placeholder{color:var(--dim);}
.btn-login{width:100%;background:var(--red);color:#fff;border:none;border-radius:4px;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.85rem;transition:background .2s,transform .15s;margin-top:.4rem;}
.btn-login:hover{background:var(--red-h);transform:translateY(-1px);}
.lerr{background:rgba(232,49,42,.1);border:1px solid var(--border-r);color:#ff8080;font-size:.75rem;padding:.5rem .85rem;border-radius:3px;margin-bottom:.85rem;display:none;}
.lerr.show{display:block;}
#vdash{overflow-y:auto;background:var(--bg);}
.dash-hdr{padding:1.75rem 0;border-bottom:1px solid var(--border);background:var(--bg2);}
.dash-hdr-in{max-width:1160px;margin:0 auto;padding:0 2.5rem;}
.dash-hdr h1{font-size:1.35rem;font-weight:800;margin-bottom:.2rem;}
.dash-hdr p{font-size:.82rem;color:var(--muted);}
.op-wrap{margin-top:.85rem;max-width:300px;}
.op-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.op-fill{height:100%;background:var(--red);border-radius:2px;transition:width .6s;}
.op-lbl{font-size:.67rem;color:var(--muted);margin-top:.3rem;}
.ugrid-wrap{max-width:1160px;margin:0 auto;padding:2rem 2.5rem 3rem;}
.ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.ucard{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;}
.ucard:hover{border-color:rgba(232,49,42,.4);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.35);}
.ucard-cover{height:170px;position:relative;overflow:hidden;background:var(--bg3);}
.cover-img{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);transition:transform .4s ease;}
.ucard:hover .cover-img{transform:scale(1.09);}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.05) 55%,transparent 100%);}
.cover-top{position:absolute;top:0;left:0;right:0;padding:.8rem .9rem;}
.ubadge{display:inline-block;font-size:.58rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:#fff;padding:.2rem .6rem;border-radius:3px;}
.ubadge-n{background:var(--red);}
.ubadge-w{background:rgba(255,255,255,.18);}
.ucard-body{padding:1.25rem 1.25rem 1rem;}
.uctitle{font-size:.97rem;font-weight:800;margin-bottom:.3rem;letter-spacing:-.01em;line-height:1.3;}
.ucdesc{font-size:.76rem;color:var(--muted);line-height:1.55;margin-bottom:.9rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ucfoot{display:flex;align-items:center;gap:.9rem;}
.upwrap{flex:1;}
.upbar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.upfill{height:100%;background:var(--green);border-radius:2px;transition:width .5s;}
.uppct{font-size:.65rem;font-weight:700;margin-top:.25rem;}
.uppct.g{color:var(--green);}
.uppct.m{color:var(--muted);}
.btn-uc{font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.42rem 1rem;border-radius:3px;border:none;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.btn-uc-s{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
.btn-uc-s:hover{background:var(--card2);color:var(--text);}
.btn-uc-c{background:var(--red);color:#fff;}
.btn-uc-c:hover{background:var(--red-h);}
.btn-uc-d{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.22);}
#vcls{background:var(--bg);}
.cls-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.shdr{padding:.9rem 1.15rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg3);}
.shdr-badge{font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:.3rem;}
.shdr-title{font-size:.82rem;font-weight:800;margin-bottom:.5rem;line-height:1.35;}
.spbar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.spfill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.sppct{font-size:.63rem;font-weight:700;color:var(--green);margin-top:.25rem;}
.slessons{flex:1;overflow-y:auto;padding:.4rem 0;}
.ssec-lbl{font-size:.57rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:.7rem 1.15rem .2rem;}
.si{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem 1.15rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.si:hover{background:rgba(255,255,255,.03);}
.si.on{background:rgba(232,49,42,.08);border-left-color:var(--red);}
.sck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;}
.sck.ok{background:var(--green);border-color:var(--green);}
.sck-svg{display:none;}
.sck.ok .sck-svg{display:block;}
.sititle{font-size:.76rem;color:var(--muted);line-height:1.35;flex:1;}
.si.on .sititle{color:var(--text);font-weight:600;}
.mc{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;}
.mc-hdr{padding:1.25rem 2rem .9rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.mc-title{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;}
.mc-body{padding:1.5rem 2rem;max-width:860px;}
.vwrap{background:var(--bg3);border:1px solid var(--border);margin-bottom:1.5rem;overflow:hidden;border-radius:5px;}
.vembed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;}
.vembed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.vph{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;color:var(--dim);min-height:180px;}
.vph-icon{font-size:2rem;opacity:.2;}
.vph p{font-size:.75rem;font-weight:600;}
.vph small{font-size:.65rem;opacity:.6;text-align:center;max-width:260px;line-height:1.5;}
.rsec{margin-bottom:1.4rem;}
.rsec-t{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding-bottom:.45rem;border-bottom:1px solid var(--border);margin-bottom:.6rem;}
.ri{display:inline-flex;align-items:center;gap:.45rem;background:var(--card2);border:1px solid var(--border);padding:.5rem .9rem;border-radius:3px;margin-right:.45rem;margin-bottom:.45rem;font-size:.75rem;font-weight:600;color:var(--muted);transition:border-color .2s,color .2s;}
.ri:hover{border-color:var(--red);color:var(--text);}
.ri-icon{color:var(--red);}
.sesbox{background:var(--card2);border:1px solid var(--border-r);border-top:2px solid var(--red);padding:1.75rem;margin-bottom:1.5rem;text-align:center;border-radius:0 0 5px 5px;}
.sesbox h3{font-size:1rem;font-weight:800;margin-bottom:.4rem;}
.sesbox p{font-size:.82rem;color:var(--muted);margin-bottom:1.25rem;}
.btn-ses{display:inline-flex;align-items:center;gap:.45rem;background:var(--red);color:#fff;border:none;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.8rem 1.75rem;border-radius:4px;transition:background .2s;}
.btn-ses:hover{background:var(--red-h);}
.note{background:rgba(232,49,42,.05);border-left:3px solid var(--red);padding:.85rem 1.1rem;margin-bottom:1.4rem;border-radius:0 4px 4px 0;}
.note p{font-size:.8rem;color:var(--muted);line-height:1.7;}
.crow{display:flex;align-items:center;justify-content:space-between;gap:.9rem;padding:1.25rem 0;border-top:1px solid var(--border);margin-top:.5rem;flex-wrap:wrap;}
.btn-cmp{display:flex;align-items:center;gap:.45rem;background:transparent;border:1px solid var(--green);color:var(--green);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.55rem 1.2rem;border-radius:4px;transition:all .2s;}
.btn-cmp:hover,.btn-cmp.done{background:rgba(34,197,94,.1);}
.btn-cmp.done{opacity:.7;cursor:default;}
.btn-nxt{display:flex;align-items:center;gap:.45rem;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.55rem 1.2rem;border-radius:4px;transition:all .2s;}
.btn-nxt:hover{border-color:var(--red);color:var(--text);}



/* ── PMT STYLES ────────────────────────────── */
.pmt-section{margin-bottom:1rem;}
.pmt-sec-header{display:flex;align-items:baseline;gap:.5rem;padding:.6rem 0 .45rem;border-bottom:2px solid rgba(232,49,42,.18);margin-bottom:.6rem;}
.pmt-sec-num{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--red);}
.pmt-sec-title{font-size:.82rem;font-weight:700;color:var(--text);}
.pmt-item{padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.pmt-item:last-child{border-bottom:none;}
.pmt-item-top{display:flex;align-items:center;gap:.75rem;}
.pmt-item-label{font-size:.82rem;font-weight:600;flex:1;color:var(--text);line-height:1.35;}
.pmt-item-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.pmt-ibar-wrap{width:72px;}
.pmt-ibar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.pmt-ibar-fill{height:100%;background:var(--red);border-radius:2px;transition:width .3s;}
.pmt-item-score{font-size:.75rem;font-weight:800;min-width:22px;text-align:right;transition:color .2s;color:var(--dim);}
.pmt-num-input{width:52px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:Montserrat,sans-serif;font-size:.9rem;font-weight:700;padding:.35rem .4rem;border-radius:4px;outline:none;text-align:center;transition:border-color .2s;}
.pmt-num-input:focus{border-color:var(--red);}
.pmt-num-input::-webkit-inner-spin-button,.pmt-num-input::-webkit-outer-spin-button{opacity:.4;}
.pmt-justif{width:100%;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:var(--muted);font-family:Montserrat,sans-serif;font-size:.74rem;padding:.45rem .7rem;border-radius:4px;outline:none;resize:vertical;min-height:38px;margin-top:.4rem;transition:border-color .2s;line-height:1.5;}
.pmt-justif:focus{border-color:rgba(255,255,255,.15);color:var(--text);}
.pmt-justif::placeholder{color:var(--dim);}
.pmt-divider{height:1px;background:var(--border);margin:1rem 0;}
.pmt-low{color:#60A5FA !important;}
.pmt-mid{color:#FCD34D !important;}
.pmt-hi{color:#4ADE80 !important;}
/* ── EXERCISE STYLES ── */
.ex-wrap{background:var(--card);border:1px solid var(--border-r);border-top:2px solid var(--red);border-radius:5px;margin-bottom:1.5rem;overflow:hidden;}
.ex-header{padding:1.1rem 1.25rem .9rem;border-bottom:1px solid var(--border);background:rgba(232,49,42,.04);}
.ex-badge{display:inline-block;font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;}
.ex-desc{font-size:.78rem;color:var(--muted);}
.ex-prog-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin:.5rem 0 .3rem;}
.ex-prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .4s;}
.ex-prog-txt{font-size:.62rem;font-weight:700;color:var(--muted);}
.ex-sec{border-bottom:1px solid var(--border);}
.ex-sec:last-of-type{border-bottom:none;}
.ex-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;cursor:pointer;transition:background .15s;}
.ex-sec-hdr:hover{background:rgba(255,255,255,.02);}
.ex-sec-num{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:.15rem;}
.ex-sec-title{font-size:.85rem;font-weight:700;}
.ex-sec-right{display:flex;align-items:center;gap:.6rem;}
.ex-sec-done{width:18px;height:18px;border-radius:50%;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--green);opacity:0;transition:opacity .2s;flex-shrink:0;}
.ex-chevron{font-size:.7rem;color:var(--dim);transition:transform .25s;flex-shrink:0;}
.ex-sec.open .ex-chevron{transform:rotate(180deg);}
.ex-sec-body{display:none;padding:.25rem 1.25rem 1.25rem;}
.ex-sec.open .ex-sec-body{display:block;}
.ex-sec-nav{display:flex;gap:.65rem;margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border);}
.btn-ex-prev{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.5rem 1rem;border-radius:3px;transition:all .2s;}
.btn-ex-prev:hover{border-color:rgba(255,255,255,.3);color:var(--text);}
.btn-ex-next{background:var(--red);border:none;color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.5rem 1.1rem;border-radius:3px;transition:background .2s;}
.btn-ex-next:hover{background:var(--red-h);}
.ex-q{margin-bottom:1rem;}
.ex-ql{font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.45rem;line-height:1.5;}
.ex-q-reflex{background:rgba(232,49,42,.04);border-left:2px solid rgba(232,49,42,.35);padding:.75rem .9rem;border-radius:0 4px 4px 0;margin-top:.5rem;}
.ex-q-reflex-label{font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:.35rem;}
.ex-ta{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Montserrat',sans-serif;font-size:.8rem;padding:.65rem .85rem;border-radius:4px;resize:vertical;min-height:64px;outline:none;transition:border-color .2s;line-height:1.65;}
.ex-ta:focus{border-color:var(--red);}
.ex-ta::placeholder{color:var(--dim);}
.ex-submit-row{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.25rem;background:rgba(232,49,42,.03);border-top:1px solid var(--border);}
.btn-ex-send{display:flex;align-items:center;gap:.45rem;background:var(--red);color:#fff;border:none;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.7rem 1.5rem;border-radius:4px;transition:background .2s;flex-shrink:0;}
.btn-ex-send:hover{background:var(--red-h);}
.btn-ex-send:disabled{opacity:.6;cursor:default;}
.ex-submit-note{font-size:.7rem;color:var(--dim);}
.ex-reflex{padding:1.1rem 1.25rem;border-top:1px solid var(--border);background:rgba(232,49,42,.03);}
.ex-reflex-title{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.85rem;}

/* Grid exercise */
.cat-row{display:flex;flex-wrap:wrap;gap:.4rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);}
.cat-pill{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.3rem .75rem;border-radius:20px;cursor:pointer;border:1.5px solid;opacity:.55;transition:opacity .15s;display:flex;align-items:center;}
.cat-pill:hover{opacity:.8;}
.grid-scroll{overflow-x:auto;padding:0;}
.week-table{width:100%;border-collapse:collapse;min-width:580px;}
.week-table thead th{background:var(--bg3);font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:.55rem .35rem;text-align:center;color:var(--muted);border-bottom:1px solid var(--border);}
.week-table thead th:first-child{text-align:left;padding-left:.85rem;width:46px;}
.week-table tbody tr:hover{background:rgba(255,255,255,.015);}
.week-table tbody td{border-bottom:1px solid rgba(255,255,255,.04);}
.hour-cell{font-size:.65rem;font-weight:700;color:var(--dim);padding:.28rem .4rem .28rem .85rem;white-space:nowrap;}
.gcell{width:100%;height:30px;background:transparent;border:none;border-left:1px solid rgba(255,255,255,.04);font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:500;color:var(--text);padding:.2rem .35rem;outline:none;cursor:text;text-align:center;transition:background .15s;}
.gcell:focus{background:rgba(232,49,42,.08);outline:1px solid rgba(232,49,42,.35);}
.gcell::placeholder{color:rgba(238,239,243,.1);}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--green);color:#fff;font-size:.75rem;font-weight:700;padding:.65rem 1.25rem;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;}
.overlay.show{display:block;}

@media(max-width:1000px){.ugrid{grid-template-columns:repeat(2,1fr);}.ucard-cover{height:150px;}}
@media(max-width:640px){
  .ugrid{grid-template-columns:1fr;}

<script>
/* ATTACHMENTS */
function getAttachments(lid){
  var draft=loadDraft(lid)||{},links=[],files=[];
  try{links=JSON.parse(draft._attachLinks||'[]');}catch(e){}
  try{files=JSON.parse(draft._attachFiles||'[]');}catch(e){}
  return{links:links,files:files};
}
function saveAttachments(lid,links,files){
  var draft=loadDraft(lid)||{};
  draft._attachLinks=JSON.stringify(links);
  draft._attachFiles=JSON.stringify(files);
  saveDraft(lid,draft);
}
function injectAttachmentSection(lid){
  if(document.getElementById('attach-sec-'+lid))return;
  var target=document.querySelector('.ex-submit-row');
  if(!target)return;
  var at=getAttachments(lid);
  var h='<div id="attach-sec-'+lid+'" class="attach-section">';
  h+='<div class="attach-title">Adjuntos</div>';
  // Links
  h+='<div class="attach-group"><div class="attach-group-label">Links</div>';
  h+='<div id="al-list-'+lid+'"></div>';
  h+='<div class="attach-row"><div class="attach-row-top">';
  h+='<input type="url" id="al-url-'+lid+'" class="attach-input" placeholder="https://...">';
  h+='<button class="attach-add-btn" onclick="attachSaveLink(\''+lid+'\')">+ Agregar</button>';
  h+='</div>';
  h+='<textarea id="al-desc-'+lid+'" class="attach-desc" placeholder="Que queres mostrar con este link? (opcional)"></textarea>';
  h+='</div></div>';
  // Files
  h+='<div class="attach-group"><div class="attach-group-label">Archivos</div>';
  h+='<div id="af-list-'+lid+'"></div>';
  h+='<div id="af-pending-'+lid+'"></div>';
  h+='<div class="attach-row">';
  h+='<label class="attach-file-label">Subir archivo<input type="file" id="af-input-'+lid+'" style="display:none;" multiple onchange="attachFilePicked(\''+lid+'\',this)"></label>';
  h+='<div class="attach-note">Maximo 5 MB por archivo.</div>';
  h+='</div></div></div>';
  target.insertAdjacentHTML('beforebegin',h);
  // Restore saved items
  var al=document.getElementById('al-list-'+lid);
  if(al)at.links.forEach(function(item,i){al.innerHTML+=renderLinkItem(lid,item,i);});
  var afl=document.getElementById('af-list-'+lid);
  if(afl)at.files.forEach(function(item,i){afl.innerHTML+=renderFileItem(lid,item,i);});
}
function renderLinkItem(lid,item,i){
  var disp=item.url.length>55?item.url.substring(0,52)+'...':item.url;
  return '<div class="attach-item" id="al-item-'+lid+'-'+i+'"><span class="attach-item-icon">&#128279;</span><div class="attach-item-body"><div class="attach-item-main"><a href="'+item.url+'" target="_blank" rel="noopener">'+disp+'</a></div>'+(item.desc?'<div class="attach-item-desc">'+item.desc+'</div>':'')+'</div><button class="attach-remove" onclick="attachRemoveLink(\''+lid+'\','+i+')" title="Eliminar">&#10005;</button></div>';
}
function renderFileItem(lid,item,i){
  var sz=item.size>1048576?(item.size/1048576).toFixed(1)+' MB':Math.round(item.size/1024)+' KB';
  return '<div class="attach-item" id="af-item-'+lid+'-'+i+'"><span class="attach-item-icon">&#128206;</span><div class="attach-item-body"><div class="attach-item-main">'+item.name+'</div><div class="attach-item-size">'+sz+'</div>'+(item.desc?'<div class="attach-item-desc">'+item.desc+'</div>':'')+'</div><button class="attach-remove" onclick="attachRemoveFile(\''+lid+'\','+i+')" title="Eliminar">&#10005;</button></div>';
}
function attachSaveLink(lid){
  var urlEl=document.getElementById('al-url-'+lid);
  var descEl=document.getElementById('al-desc-'+lid);
  if(!urlEl)return;
  var url=urlEl.value.trim();if(!url)return;
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  var desc=descEl?descEl.value.trim():'';
  var at=getAttachments(lid);at.links.push({url:url,desc:desc});
  saveAttachments(lid,at.links,at.files);
  var al=document.getElementById('al-list-'+lid);
  if(al)al.innerHTML+=renderLinkItem(lid,{url:url,desc:desc},at.links.length-1);
  urlEl.value='';if(descEl)descEl.value='';
  updateSaveStatus('Link guardado','#22C55E');
}
function attachRemoveLink(lid,idx){
  var at=getAttachments(lid);at.links.splice(idx,1);saveAttachments(lid,at.links,at.files);
  var al=document.getElementById('al-list-'+lid);
  if(al){al.innerHTML='';at.links.forEach(function(item,i){al.innerHTML+=renderLinkItem(lid,item,i);});}
}
function attachFilePicked(lid,input){
  var files=Array.from(input.files);if(!files.length)return;
  var pending=document.getElementById('af-pending-'+lid);if(!pending)return;
  var MAX=5*1024*1024;
  files.forEach(function(file){
    if(file.size>MAX){showToast('Archivo "'+file.name+'" supera 5 MB');return;}
    var pid='afp-'+lid+'-'+Date.now()+Math.random().toString(36).slice(2);
    var sz=file.size>1048576?(file.size/1048576).toFixed(1)+' MB':Math.round(file.size/1024)+' KB';
    var h='<div class="attach-pending" id="'+pid+'">';
    h+='<div class="attach-pending-name">&#128206; '+file.name+' <span style="font-size:.65rem;color:var(--dim);">'+sz+'</span></div>';
    h+='<textarea class="attach-desc" id="'+pid+'-desc" placeholder="Que queres mostrar con este archivo? (opcional)"></textarea>';
    h+='<div style="display:flex;gap:.5rem;margin-top:.2rem;">';
    h+='<button class="attach-add-btn" style="background:var(--red);border-color:var(--red);color:#fff;" onclick="attachConfirmFile(\''+lid+'\',\''+pid+'\',this)">Confirmar</button>';
    h+='<button class="attach-add-btn" onclick="document.getElementById(\''+pid+'\').remove()">Cancelar</button>';
    h+='</div></div>';
    pending.innerHTML+=h;
    // Store file data
    var reader=new FileReader();
    reader.onload=function(e){
      document.getElementById(pid).dataset.b64=e.target.result;
      document.getElementById(pid).dataset.name=file.name;
      document.getElementById(pid).dataset.size=file.size;
      document.getElementById(pid).dataset.type=file.type;
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function attachConfirmFile(lid,pid,btn){
  var el=document.getElementById(pid);if(!el)return;
  var name=el.dataset.name,size=parseInt(el.dataset.size||0),type=el.dataset.type||'',b64=el.dataset.b64||'';
  if(!name){showToast('Esperando que se cargue el archivo...');return;}
  var descEl=document.getElementById(pid+'-desc');
  var desc=descEl?descEl.value.trim():'';
  // Save file data to localStorage
  if(b64){try{localStorage.setItem('pp_attach_'+S.user+'_'+lid+'_'+name,b64);}catch(err){showToast('Archivo demasiado grande');return;}}
  var at=getAttachments(lid);
  at.files.push({name:name,size:size,type:type,desc:desc});
  saveAttachments(lid,at.links,at.files);
  el.remove();
  var afl=document.getElementById('af-list-'+lid);
  if(afl)afl.innerHTML+=renderFileItem(lid,{name:name,size:size,type:type,desc:desc},at.files.length-1);
  updateSaveStatus('Archivo guardado','#22C55E');
}
function attachRemoveFile(lid,idx){
  var at=getAttachments(lid);
  if(at.files[idx])localStorage.removeItem('pp_attach_'+S.user+'_'+lid+'_'+at.files[idx].name);
  at.files.splice(idx,1);saveAttachments(lid,at.links,at.files);
  var afl=document.getElementById('af-list-'+lid);
  if(afl){afl.innerHTML='';at.files.forEach(function(item,i){afl.innerHTML+=renderFileItem(lid,item,i);});}
}
function getAttachAnswers(lid){
  var at=getAttachments(lid),answers=[];
  at.links.forEach(function(item,i){answers.push({fid:'_link_'+i,pregunta:'Link '+(i+1)+(item.desc?' - '+item.desc:''),respuesta:item.url});});
  at.files.forEach(function(item,i){answers.push({fid:'_file_'+i,pregunta:'Archivo '+(i+1)+(item.desc?' - '+item.desc:''),respuesta:item.name});});
  return answers;
}
function adminAttachHTML(resps){
  var linkR=(resps||[]).filter(function(r){return r.fid&&r.fid.indexOf('_link_')===0&&r.respuesta;});
  var fileR=(resps||[]).filter(function(r){return r.fid&&r.fid.indexOf('_file_')===0&&r.respuesta;});
  if(!linkR.length&&!fileR.length)return '';
  var h='<div style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;">';
  if(linkR.length){
    h+='<div class="sub-q"><div class="sub-ql" style="color:#3B82F6;">🔗 Links adjuntos</div>';
    linkR.forEach(function(r){
      var desc=r.pregunta.replace(/^Link \d+ - /,'').replace(/^Link \d+$/,'');
      h+='<div style="margin:.25rem 0;font-size:.78rem;"><a href="'+r.respuesta+'" target="_blank" style="color:#93C5FD;">'+r.respuesta+'</a>';
      if(desc)h+='<div style="font-size:.72rem;color:var(--muted);margin-top:.1rem;">'+desc+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(fileR.length){
    h+='<div class="sub-q"><div class="sub-ql" style="color:#F59E0B;">📎 Archivos adjuntos</div>';
    fileR.forEach(function(r){
      var desc=r.pregunta.replace(/^Archivo \d+ - /,'').replace(/^Archivo \d+$/,'');
      h+='<div style="margin:.25rem 0;font-size:.78rem;color:var(--text);">📄 '+r.respuesta;
      if(desc)h+='<div style="font-size:.72rem;color:var(--muted);margin-top:.1rem;">'+desc+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}
function pdfAttachHTML(resps){
  var linkR=(resps||[]).filter(function(r){return r.fid&&r.fid.indexOf('_link_')===0&&r.respuesta;});
  var fileR=(resps||[]).filter(function(r){return r.fid&&r.fid.indexOf('_file_')===0&&r.respuesta;});
  if(!linkR.length&&!fileR.length)return '';
  var h='<div style="margin-top:10px;border-top:1px solid #e8e8e8;padding-top:8px;">';
  if(linkR.length){
    h+='<div style="font-size:9px;font-weight:700;color:#2563EB;margin-bottom:4px;">🔗 Links adjuntos</div>';
    linkR.forEach(function(r){
      var desc=r.pregunta.replace(/^Link \d+ - /,'').replace(/^Link \d+$/,'');
      h+='<div style="font-size:9px;margin-bottom:3px;"><a href="'+r.respuesta+'" style="color:#2563EB;">'+r.respuesta+'</a>';
      if(desc)h+='<span style="color:#666;margin-left:4px;">— '+desc+'</span>';
      h+='</div>';
    });
  }
  if(fileR.length){
    h+='<div style="font-size:9px;font-weight:700;color:#D97706;margin-top:4px;margin-bottom:4px;">📎 Archivos adjuntos</div>';
    fileR.forEach(function(r){
      var desc=r.pregunta.replace(/^Archivo \d+ - /,'').replace(/^Archivo \d+$/,'');
      h+='<div style="font-size:9px;margin-bottom:3px;">📄 '+r.respuesta;
      if(desc)h+='<span style="color:#666;margin-left:4px;">— '+desc+'</span>';
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}
/* FIN ATTACHMENTS */
/* FIREBASE SYNC */
var DB=window.DB||null;
function fbUserRef(user,path){return DB?DB.ref('psicopoker/users/'+user+(path?'/'+path:'')):(null);}
function fbSaveDraft(user,lid,data){var r=fbUserRef(user,'drafts/'+lid);if(r)r.set(data).catch(function(){});}
function fbSaveProgress(user,lid){var r=fbUserRef(user,'progress/'+lid);if(r)r.set(true).catch(function(){});}
function fbSaveSubmission(user,lid,rec){var r=fbUserRef(user,'submissions/'+lid);if(r)r.set(rec).catch(function(){});}
function fbSaveExtraUsers(extra){var r=DB?DB.ref('psicopoker/app/extra_users'):null;if(r)r.set(extra).catch(function(){});}
function fbLoadExtraUsers(cb){
  if(!DB){cb();return;}
  DB.ref('psicopoker/app/extra_users').once('value')
    .then(function(s){var d=s.val();if(d&&Object.keys(d).length){localStorage.setItem('pp_extra_users',JSON.stringify(d));USERS=getAllUsers();}cb();})
    .catch(function(){cb();});
}
function loadFromFirebase(username,cb){
  if(!DB){cb(false);return;}
  fbUserRef(username).once('value')
    .then(function(snapshot){
      var data=snapshot.val();
      if(!data){cb(false);return;}
      var changed=false;
      if(data.progress){
        var ex={};try{ex=JSON.parse(localStorage.getItem('pp_p_'+username)||'{}');}catch(e){}
        localStorage.setItem('pp_p_'+username,JSON.stringify(Object.assign({},data.progress,ex)));
        changed=true;
      }
      if(data.drafts){
        Object.keys(data.drafts).forEach(function(lid){
          var k='pp_draft_'+username+'_'+lid;
          if(!localStorage.getItem(k)){localStorage.setItem(k,JSON.stringify(data.drafts[lid]));changed=true;}
        });
      }
      if(data.submissions){
        var subs=getLocalSubs(),existing={};
        subs.forEach(function(s){if(s.usuario===username&&s.lid)existing[s.lid]=1;});
        Object.keys(data.submissions).forEach(function(lid){
          if(!existing[lid]){subs.push(data.submissions[lid]);changed=true;}
        });
        if(changed)localStorage.setItem('pp_submissions',JSON.stringify(subs));
      }
      cb(changed);
    })
    .catch(function(){cb(false);});
}
function fbPushAllLocal(username){
  if(!DB||!username)return;
  var prog={};try{prog=JSON.parse(localStorage.getItem('pp_p_'+username)||'{}');}catch(e){}
  if(Object.keys(prog).length)fbUserRef(username,'progress').set(prog).catch(function(){});
  Object.keys(localStorage).forEach(function(k){
    if(k.indexOf('pp_draft_'+username+'_')===0){
      var lid=k.replace('pp_draft_'+username+'_','');
      try{var d=JSON.parse(localStorage.getItem(k));fbUserRef(username,'drafts/'+lid).set(d).catch(function(){});}catch(e){}
    }
  });
  getLocalSubs().filter(function(s){return s.usuario===username;}).forEach(function(s){
    if(s.lid)fbUserRef(username,'submissions/'+s.lid).set(s).catch(function(){});
  });
}
/* FIN FIREBASE SYNC */

function generateMyUnitPDF(){
  var unit=C.find(function(u){return u.id===S.unitId;});if(!unit)return;
  var user=USERS[S.user];
  var unitName=unit.name||unit.id;
  var allLids=(unit.lessons||[]).concat(unit.extra||[]).map(function(l){return l.id;});

function isDone(lid) { return !!prog()[lid]; }
function unitProg(u) {
  var all = (u.lessons || []).concat(u.extra || []);
  var d = all.filter(function(l) { return isDone(l.id); }).length;
  return { d: d, t: all.length, pct: all.length ? Math.round(d / all.length * 100) : 0 };
}
function totalPct() {
  var d = 0, t = 0;
  C.forEach(function(u) { var p = unitProg(u); d += p.d; t += p.t; });
  return t ? Math.round(d / t * 100) : 0;
}

function renderGridExercise(lid, def) {
  var draft = loadDraft(lid);
  if (!draft) {
    var subs = getLocalSubs();
    var sub = subs.find(function(s){ return s.usuario===S.user && s.lid===lid; });
    if (sub && sub.respuestas) {
      draft = {};
      sub.respuestas.forEach(function(r){
        if (r.fid) { draft[r.fid]=r.respuesta||''; if(r.color)draft[r.fid+'_c']=r.color; }
      });
    }
  }
  var startH = (draft && draft.startHour) ? parseInt(draft.startHour) : 7;
  var endH   = (draft && draft.endHour)   ? parseInt(draft.endHour)   : 23;
  var days   = def.days || ['Lunes','Martes','Mierc.','Jueves','Viernes','Sabado','Domingo'];
  function hrOpts(sel,mn,mx){var o='';for(var i=mn;i<=mx;i++)o+='<option value="'+i+'"'+(i===sel?' selected':'')+'>'+i+':00</option>';return o;}
  var h='<div class="ex-wrap">';
  h+='<div style="display:flex;align-items:center;gap:1rem;padding:.85rem 1.25rem;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap;">';
  h+='<span style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Franja horaria:</span>';
  h+='<div style="display:flex;align-items:center;gap:.5rem;">';
  h+='<label style="font-size:.72rem;color:var(--muted);">Desde</label>';
  h+='<select id="grid-start-hr_'+lid+'" onchange="updateGridRows(\''+lid+'\')" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:Montserrat,sans-serif;font-size:.75rem;padding:.35rem .6rem;border-radius:4px;outline:none;cursor:pointer;">'+hrOpts(startH,0,22)+'</select>';
  h+='<label style="font-size:.72rem;color:var(--muted);">hasta</label>';
  h+='<select id="grid-end-hr_'+lid+'" onchange="updateGridRows(\''+lid+'\')" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:Montserrat,sans-serif;font-size:.75rem;padding:.35rem .6rem;border-radius:4px;outline:none;cursor:pointer;">'+hrOpts(endH,1,23)+'</select>';
  h+='</div><span style="font-size:.68rem;color:var(--dim);">Ajustalo a tu rutina</span></div>';
  h+='<div class="cat-row">';
  [['#E8312A','Poker'],['#3B82F6','Estudio'],['#22C55E','Familia'],['#F59E0B','Ocio'],['#8B5CF6','Trabajo'],['#EC4899','Descanso'],['#6B7280','Otro']].forEach(function(cat){
    h+='<div class="cat-pill" onclick="selCat(this,\''+cat[0]+'\')" style="border-color:'+cat[0]+'44;color:'+cat[0]+';"><span style="background:'+cat[0]+';width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;"></span>'+cat[1]+'</div>';
  });
  h+='</div>';
  h+='<div class="grid-scroll"><table class="week-table"><thead><tr><th>Hora</th>';
  days.forEach(function(d){h+='<th>'+d+'</th>';});
  h+='</tr></thead><tbody id="grid-tbody-'+lid+'">';
  for(var hh=startH;hh<=endH;hh++){
    var hr=hh+':00';
    h+='<tr><td class="hour-cell">'+hr+'</td>';
    days.forEach(function(d,di){
      var fid='g_'+hr.replace(':','')+'_'+di;
      var val=(draft&&draft[fid])?draft[fid]:'';
      var clr=(draft&&draft[fid+'_c'])?draft[fid+'_c']:'';
      var st=val&&clr?' style="background:'+clr+'22;color:'+clr+';border-color:'+clr+'55;"':'';
      var dc=clr?' data-color="'+clr+'"':'';
      h+='<td><input class="gcell" type="text" data-fid="'+fid+'"'+dc+' value="'+val.replace(/"/g,'&quot;')+'" placeholder="..." onclick="colorCell(this)" oninput="triggerAutoSave(\''+lid+'\')" onfocus="colorCell(this)"'+st+'></td>';
    });
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  h+='<div class="ex-reflex"><p class="ex-reflex-title">Reflexion sobre la semana</p>';
  (def.reflexion||[]).forEach(function(r){
    var val=(draft&&draft[r.fid])?draft[r.fid]:'';
    h+='<div class="ex-q"><p class="ex-ql">'+r.label+'</p>';
    h+='<textarea class="ex-ta" data-fid="'+r.fid+'" oninput="triggerAutoSave(\''+lid+'\')" placeholder="Escribi tu respuesta...">'+val+'</textarea></div>';
  });
  h+='</div>';
  var alreadyDone=isDone(lid);
  h+='<div class="ex-submit-row"><button class="btn-ex-send" id="btn-ex-'+lid+'" onclick="doSubmit(\''+lid+'\')" '+(alreadyDone?'style="background:var(--green);"':'')+'>'+
  '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7L13 1L7 13L6 8L1 7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>'+
  ' '+(alreadyDone?'Actualizar envio':'Enviar a Mauro')+'</button>'+
  '<p class="ex-submit-note">Se guarda automaticamente mientras escribis</p></div></div>';
  return h;
}

function renderFormExercise(lid, def) {
  var draft = loadDraft(lid);
  var h = '<div class="ex-wrap">';
  h += '<div class="ex-header"><div class="ex-badge">Ejercicio interactivo</div>';
  h += '<div class="ex-prog-bar"><div class="ex-prog-fill" id="ex-prog-' + lid + '" style="width:' + Math.round(100/def.sections.length) + '%"></div></div>';
  h += '<p class="ex-prog-txt" id="ex-prog-txt-' + lid + '">Seccion 1 de ' + def.sections.length + '</p>';
  h += '</div>';

  var allQ = [];
  def.sections.forEach(function(sec, si) {
    var secId = 'exsec_' + lid + '_' + si;
    h += '<div class="ex-sec" id="' + secId + '">';
    h += '<div class="ex-sec-hdr" onclick="toggleExSec(\'' + secId + '\')">';
    h += '<div><p class="ex-sec-num">Seccion ' + (si+1) + ' de ' + def.sections.length + '</p>';
    h += '<p class="ex-sec-title" style="' + (sec.desc ? 'font-size:1rem;font-weight:800;line-height:1.4;' : '') + '">' + sec.title + '</p></div>';
    h += '<div class="ex-sec-right"><div class="ex-sec-done" id="done-' + secId + '">&#10003;</div>';
    h += '<span class="ex-chevron">&#9660;</span></div></div>';
    h += '<div class="ex-sec-body">';
    if (sec.desc) {
      h += '<div style="background:rgba(232,49,42,.04);border-left:3px solid rgba(232,49,42,.3);padding:.85rem 1.1rem;margin-bottom:1.1rem;border-radius:0 4px 4px 0;">';
      h += '<p style="font-size:.82rem;color:var(--muted);line-height:1.8;white-space:pre-line;">' + sec.desc + '</p>';
      h += '</div>';
    }
    sec.questions.forEach(function(q, qi) {
      var saved = draft && draft[q.fid] ? draft[q.fid] : '';
      var isReflex = q.fid.endsWith('rl');
      h += '<div class="ex-q ' + (isReflex ? 'ex-q-reflex' : '') + '">';
      if (isReflex) h += '<p class="ex-q-reflex-label">Reflexion libre</p>';
      h += '<p class="ex-ql">' + q.label + '</p>';
      if (q.type === 'scale') {
        h += '<select class="ex-select" data-fid="' + q.fid + '" oninput="triggerAutoSave(\'' + lid + '\');markSecProgress(\'' + secId + '\',\'' + lid + '\')">';
        h += '<option value="">- elegir -</option>';
        (q.options || []).forEach(function(opt) {
          h += '<option value="' + opt + '"' + (saved === opt ? ' selected' : '') + '>' + opt + '</option>';
        });
        h += '</select></div>';
      } else {
        h += '<textarea class="ex-ta" data-fid="' + q.fid + '" oninput="triggerAutoSave(\'' + lid + '\');markSecProgress(\'' + secId + '\',\'' + lid + '\')" placeholder="Escribi tu respuesta...">' + saved + '</textarea></div>';
      }
      allQ.push(q);
    });
    h += '<div class="ex-sec-nav">';
    if (si > 0) h += '<button class="btn-ex-prev" onclick="navExSec(\'' + lid + '\',' + (si-1) + ')">&#8592; Anterior</button>';
    if (si < def.sections.length - 1) h += '<button class="btn-ex-next" onclick="navExSec(\'' + lid + '\',' + (si+1) + ')">Siguiente &#8594;</button>';
    h += '</div>';
    if (sec.note) {
      h += '<div style="background:rgba(34,197,94,.06);border-left:3px solid rgba(34,197,94,.35);padding:.85rem 1.1rem;margin-top:1rem;border-radius:0 4px 4px 0;">';
      h += '<p style="font-size:.8rem;color:var(--muted);line-height:1.75;white-space:pre-line;">' + sec.note + '</p>';
      h += '</div>';
    }
    h += '</div></div>';
  });

  h += '<div class="ex-submit-row">';
  h += '<button class="btn-ex-send" id="btn-ex-' + lid + '" onclick="doSubmit(\'' + lid + '\')">';
  h += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7L13 1L7 13L6 8L1 7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>';
  h += ' Enviar a Mauro</button>';
  h += '<p class="ex-submit-note">Se enviara a la planilla de seguimiento de Mauro</p>';
  h += '</div></div>';

  window['_exQ_' + lid] = allQ;
  return h;
}

function toggleExSec(secId) {
  var el = document.getElementById(secId);
  el.classList.toggle('open');
}

function navExSec(lid, idx) {
  var def = EX_DEFS[lid];
  if (!def) return;
  document.querySelectorAll('[id^="exsec_' + lid + '_"]').forEach(function(s) { s.classList.remove('open'); });
  var target = document.getElementById('exsec_' + lid + '_' + idx);
  if (target) {
    target.classList.add('open');
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  var pct = Math.round(((idx + 1) / def.sections.length) * 100);
  var pfill = document.getElementById('ex-prog-' + lid);
  var ptxt = document.getElementById('ex-prog-txt-' + lid);
  if (pfill) pfill.style.width = pct + '%';
  if (ptxt) ptxt.textContent = 'Seccion ' + (idx + 1) + ' de ' + def.sections.length;
}

function markSecProgress(secId, lid) {
  var sec = document.getElementById(secId);
  if (!sec) return;
  var filled = Array.from(sec.querySelectorAll('textarea')).some(function(ta) { return ta.value.trim().length > 0; });
  var doneEl = document.getElementById('done-' + secId);
  if (doneEl) doneEl.style.opacity = filled ? '1' : '0';
}

var activeCatColor = '#E8312A';
function selCat(el, color) {
  document.querySelectorAll('.cat-pill').forEach(function(p) { p.style.fontWeight = '600'; p.style.opacity = '0.6'; });
  el.style.fontWeight = '800'; el.style.opacity = '1';
  activeCatColor = color;
}
function colorCell(el) {
  if (el.value === '' && !el.matches(':focus')) return;
  el.style.background = activeCatColor + '22';
  el.style.color = activeCatColor;
  el.style.borderColor = activeCatColor + '55';
}

function doSubmit(lid){
  var def=EX_DEFS[lid];if(!def)return;
  var btn=document.getElementById('btn-ex-'+lid);
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  collectAndSave(lid);
  var user=USERS[S.user];
  var answers=[];
  if(def.type==='grid'){
    var ss=document.getElementById('grid-start-hr_'+lid);
    var es=document.getElementById('grid-end-hr_'+lid);
    var startH=ss?parseInt(ss.value):7, endH=es?parseInt(es.value):23;
    var days=def.days||['Lunes','Martes','Mierc.','Jueves','Viernes','Sabado','Domingo'];
    answers.push({fid:'_startHour',pregunta:'Hora inicio',respuesta:String(startH)});
    answers.push({fid:'_endHour',pregunta:'Hora fin',respuesta:String(endH)});
    (def.reflexion||[]).forEach(function(q){
      var el=document.querySelector('[data-fid="'+q.fid+'"]');
      answers.push({fid:q.fid,pregunta:q.label,respuesta:el?el.value.trim():''});
    });
    for(var hh=startH;hh<=endH;hh++){
      var hr=hh+':00';
      days.forEach(function(d,di){
        var fid='g_'+hr.replace(':','')+'_'+di;
        var el=document.querySelector('[data-fid="'+fid+'"]');
        if(!el)return;
        var val=el.value.trim(), clr=el.getAttribute('data-color')||'';
        if(val)answers.push({fid:fid,pregunta:hr+' \u2014 '+d,respuesta:val,color:clr});
      });
    }
  } else {
    (window['_exQ_'+lid]||[]).forEach(function(q){
      var el=document.querySelector('[data-fid="'+q.fid+'"]');
      answers.push({fid:q.fid,pregunta:q.label,respuesta:el?el.value.trim():''});
    });
  }
  var rec={ts:Date.now(),fecha:new Date().toLocaleString('es-AR'),jugador:user.name,
    usuario:S.user,unidad:def.unit,ejercicio:def.name,lid:lid,respuestas:answers};
  getAttachAnswers(lid).forEach(function(a){answers.push(a);});
  var saved=getLocalSubs();
  var idx=saved.findIndex(function(s){return s.usuario===S.user&&s.lid===lid;});
  if(idx>=0){rec.airtableId=saved[idx].airtableId;saved[idx]=rec;}else{saved.push(rec);}
  localStorage.setItem('pp_submissions',JSON.stringify(saved));
  markDoneL(lid);
  fbSaveSubmission(S.user,lid,rec);
  updateSaveStatus('Enviado a Mauro','#22C55E');
  var isUpdate=idx>=0;
  if(btn){btn.textContent=isUpdate?'Actualizar envio':'Enviar a Mauro';btn.style.background='#22C55E';btn.disabled=false;}
  showToast(isUpdate?'Respuestas actualizadas!':'Enviado a Mauro!');
  var unit=C.find(function(u){return u.id===S.unitId;});if(unit)renderSidebar(unit);
  if(isUpdate&&rec.airtableId){updateAirtable(rec.airtableId,rec);}
  else{createAirtable(rec,function(id){if(id){var s2=getLocalSubs();var i2=s2.findIndex(function(s){return s.usuario===S.user&&s.lid===lid;});if(i2>=0){s2[i2].airtableId=id;localStorage.setItem('pp_submissions',JSON.stringify(s2));}}});}
}

/* ═══════════════════════════════════════════════
   CONTENT RENDERER
   ═══════════════════════════════════════════════ */
function renderContent(unit, lid) {
  var all = (unit.lessons || []).concat(unit.extra || []);
  var lesson = all.find(function(l) { return l.id === lid; });
  if (!lesson) return;
  var done = isDone(lid);
  var idx = all.indexOf(lesson);
  var next = all[idx + 1];
  document.getElementById('mc-title').textContent = lesson.title;

  var hasDraft = !!loadDraft(lid);
  var saveHtml = '<div id="save-status" style="font-size:.65rem;font-weight:600;color:rgba(238,239,243,.4);">';
  saveHtml += hasDraft ? 'Borrador guardado' : 'Sin cambios';
  saveHtml += '</div>';
  document.getElementById('mc-hdr-extra').innerHTML = saveHtml;

  var body = '';

  // VIDEO
  if (lesson.type !== 'resource' && lesson.type !== 'session' && !lesson.noVideo) {
    if (lesson.driveId) {
      body += '<div class="vwrap"><div class="vembed">';
      body += '<iframe src="https://drive.google.com/file/d/' + lesson.driveId + '/preview" allow="autoplay" allowfullscreen></iframe>';
      body += '</div></div>';
    } else {
      body += '<div class="vwrap"><div class="vph">';
      body += '<div class="vph-icon">&#9654;</div><p>Video proximamente</p>';
      body += '<small>El video de esta leccion sera cargado en breve.</small></div></div>';
    }
  }

  // NOTE
  if (lesson.note) body += '<div class="note"><p>' + lesson.note + '</p></div>';

  // RESOURCES (only if no exercise replacing them)
  if (lesson.res && lesson.res.length && !lesson.ex) {
    body += '<div class="rsec"><div class="rsec-t">Recursos</div>';
    lesson.res.forEach(function(r) {
      body += '<a href="' + r.u + '" target="_blank" class="ri"><span class="ri-icon">&#128206;</span>' + r.n + '</a>';
    });
    body += '</div>';
  }

  // SESSION
  if (lesson.type === 'session') {
    body += '<div class="sesbox"><h3>Sesion 1 a 1 con tu psicologo</h3>';
    body += '<p>Agenda tu sesion personalizada.</p>';
    body += '<a href="https://calendly.com/lucho-torres8/30min" target="_blank" class="btn-ses">&#128197; Agendar mi sesion</a></div>';
  }

  // INTERACTIVE EXERCISE
  if (lesson.ex && EX_DEFS[lid]) {
    var def = EX_DEFS[lid];
    var exType = lesson.ex.type || def.type;
    if (exType === 'teosq') {
      document.getElementById('mc-body').innerHTML = body;
      renderTEOSQExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'pmt') {
      document.getElementById('mc-body').innerHTML = body;
      renderPMTExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'iped') {
      document.getElementById('mc-body').innerHTML = body;
      renderIPEDExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'gps') {
      document.getElementById('mc-body').innerHTML = body;
      renderGPSExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'checklist') {
      document.getElementById('mc-body').innerHTML = body;
      renderChecklistExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'equip') {
      document.getElementById('mc-body').innerHTML = body;
      renderEquipExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'conciencia') {
      document.getElementById('mc-body').innerHTML = body;
      renderConcienciaExercise(lid);
      document.getElementById('mc').scrollTop = 0;
      return;
    } else if (exType === 'grid') body += renderGridExercise(lid, def);
    else if (exType === 'form') body += renderFormExercise(lid, def);
  }

  // COMPLETE ROW (only if no exercise — exercises auto-complete on submit)
  if (!lesson.ex) {
    body += '<div class="crow">';
    body += '<button class="btn-cmp' + (done ? ' done' : '') + '" onclick="markComplete(\'' + lid + '\')" ' + (done ? 'disabled' : '') + '>';
    body += '<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5L4.5 8.5L12 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>';
    body += done ? ' Completada' : ' Marcar como completada';
    body += '</button>';
    if (next) {
      var st = next.title.length > 36 ? next.title.substring(0, 36) + '...' : next.title;
      body += '<button class="btn-nxt" onclick="openLesson(\'' + S.unitId + '\',\'' + next.id + '\')">Siguiente: ' + st + ' &rarr;</button>';
    } else {
      body += '<button class="btn-nxt" onclick="showDash()">&larr; Volver al programa</button>';
    }
    body += '</div>';
  }

  document.getElementById('mc-body').innerHTML = body;
  document.getElementById('mc').scrollTop = 0;

  // Open first section if form exercise
  if (lesson.ex && EX_DEFS[lid] && EX_DEFS[lid].type === 'form') {
    var firstSec = document.getElementById('exsec_' + lid + '_0');
    if (firstSec) firstSec.classList.add('open');
    restoreDraft(lid);
  }
  if(lesson.ex)setTimeout(function(){injectAttachmentSection(lid);},120);
  if (lesson.ex && EX_DEFS[lid] && EX_DEFS[lid].type === 'grid') {
    restoreDraft(lid);
    // Re-color cells that have values
    document.querySelectorAll('.gcell').forEach(function(el) {
      if (el.value) el.style.background = '#E8312A22';
    });
  }
}

function markComplete(lid) {
  markDoneL(lid);
  showToast('Leccion completada! \uD83C\uDFAF');
  var unit = C.find(function(u) { return u.id === S.unitId; });
  renderSidebar(unit); renderContent(unit, lid);
}

function restoreFromAirtable(usuario,cb){
  var existing={};try{existing=JSON.parse(localStorage.getItem('pp_p_'+usuario)||'{}');}catch(e){}
  if(Object.keys(existing).length>0){cb();return;}
  var filter=encodeURIComponent('({Usuario}="'+usuario+'")');
  fetch(AIRTABLE_URL+'?filterByFormula='+filter+'&pageSize=100',{headers:{'Authorization':'Bearer '+AIRTABLE_TOKEN}})
  .then(function(r){return r.json();})
  .then(function(resp){
    if(!resp.records||!resp.records.length){cb();return;}
    var progress={},subs=getLocalSubs(),keys={};
    subs.forEach(function(s){if(s.usuario===usuario&&s.lid)keys[s.lid]=1;});
    resp.records.forEach(function(rec){
      var f=rec.fields,lid=f.Lid||'';
      if(lid){progress[lid]=true;if(!keys[lid]){
        var resps=(f.Respuestas||'').split('\n\n---\n\n').map(function(b){var nl=b.indexOf('\n');return{fid:'',pregunta:nl>-1?b.substring(0,nl):b,respuesta:nl>-1?b.substring(nl+1):''};});
        subs.push({ts:0,fecha:f.Fecha||'',jugador:f.Jugador||'',usuario:usuario,unidad:f.Unidad||'',ejercicio:f.Ejercicio||'',lid:lid,airtableId:rec.id,respuestas:resps});keys[lid]=1;
      }}
    });
    localStorage.setItem('pp_p_'+usuario,JSON.stringify(progress));
    localStorage.setItem('pp_submissions',JSON.stringify(subs));
    showToast('Progreso restaurado desde la nube');cb();
  }).catch(function(){cb();});
}

        local.push({ts:0,fecha:f.Fecha||'',jugador:f.Jugador||'',usuario:f.Usuario||'',unidad:f.Unidad||'',ejercicio:f.Ejercicio||'',lid:f.Lid||'',airtableId:rec.id,respuestas:resps});

function renderAdminPanel(subs){
  var latest={};
  subs.forEach(function(s){var key=(s.usuario||'?')+'|'+(s.lid||s.ejercicio||'?');if(!latest[key]||(s.ts||0)>(latest[key].ts||0))latest[key]=s;});
  var patients={};
  Object.values(latest).forEach(function(s){var k=s.usuario||s.jugador||'?';if(!patients[k])patients[k]={nombre:s.jugador||k,usuario:k,ejercicios:[],lastTs:0};patients[k].ejercicios.push(s);if((s.ts||0)>patients[k].lastTs)patients[k].lastTs=s.ts||0;});
  adminData=Object.values(patients).sort(function(a,b){if(b.lastTs!==a.lastTs)return b.lastTs-a.lastTs;return a.nombre.localeCompare(b.nombre,'es',{sensitivity:'base'});});
  renderPatientList('');
  if(!activePatient&&adminData.length>0)showPatient(adminData[0].usuario);
  else if(activePatient)showPatient(activePatient);
}

function renderPatientList(filter){
  var f=(filter||'').toLowerCase().trim();
  var filtered=adminData.filter(function(p){return!f||p.nombre.toLowerCase().includes(f)||p.usuario.toLowerCase().includes(f);});
  var plist=document.getElementById('admin-patient-list');
  if(!adminData.length){if(plist)plist.innerHTML='<div style="padding:1.25rem 1.1rem;font-size:.78rem;color:var(--dim);">Sin respuestas todavia.</div>';var ac=document.getElementById('admin-content');if(ac)ac.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:4rem 2rem;"><div style="font-size:3rem;opacity:.08;margin-bottom:1rem;">&#128101;</div><p style="font-size:.9rem;font-weight:700;margin-bottom:.4rem;">Sin pacientes todavia</p></div>';return;}
  if(!filtered.length){if(plist)plist.innerHTML='<div style="padding:1.1rem;font-size:.75rem;color:var(--dim);">Ningun resultado.</div>';return;}
  var h='';
  filtered.forEach(function(p){var n=p.ejercicios.length,active=p.usuario===activePatient;h+='<div class="admin-ex-item'+(active?' on':'')+'" onclick="showPatient(\''+p.usuario+'\')">';h+='<div style="display:flex;align-items:center;gap:.65rem;"><div style="width:28px;height:28px;border-radius:50%;background:'+(active?'var(--red)':'var(--card2)')+';display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:'+(active?'#fff':'var(--muted)')+';flex-shrink:0;">'+(p.nombre[0]||'?').toUpperCase()+'</div>';h+='<div><div class="aei-name">'+p.nombre+'</div><div class="aei-count">'+n+' ejercicio'+(n!==1?'s':'')+' completado'+(n!==1?'s':'')+'</div></div></div></div>';});
  if(plist)plist.innerHTML=h;
}

function showPatient(usuario){
  activePatient=usuario;
  renderPatientList(document.getElementById('admin-search')?document.getElementById('admin-search').value:'');
  var patient=adminData.find(function(p){return p.usuario===usuario;});
  if(!patient)return;
  var UNIT_ORDER=['Bienvenida','Unidad 1','Unidad 2','Unidad 3','Unidad 4','Unidad 5','Unidad 6','Unidad 7','Unidad 8'];
  function unitIdx(u){var i=UNIT_ORDER.findIndex(function(x){return u&&u.toLowerCase().includes(x.toLowerCase());});return i===-1?99:i;}
  var byUnit={};
  patient.ejercicios.forEach(function(e){var u=e.unidad||'Sin unidad';if(!byUnit[u])byUnit[u]=[];byUnit[u].push(e);});
  var sortedUnits=Object.keys(byUnit).sort(function(a,b){return unitIdx(a)-unitIdx(b);});
  var h='';
  // Patient header
  h+='<div class="admin-patient-hdr">';

function renderGridAdminView(ej,cid){
  var resps=ej.respuestas||[];

  var gridCells=resps.filter(function(r){return r.fid&&/^g_\d+_\d+$/.test(r.fid);});

      h+='</tr></thead><tbody>';

        h+='<tr style="'+(hi%2===0?'background:rgba(255,255,255,.015);':'')+'"><td style="font-size:.7rem;font-weight:700;color:var(--muted);padding:.35rem .75rem;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;">'+hr+'</td>';

          var cell=sched[hr]&&sched[hr][di], val=cell?cell.val:'', clr=cell?cell.color:'';
          h+='<td style="border-bottom:1px solid rgba(255,255,255,.04);border-left:1px solid rgba(255,255,255,.04);padding:.25rem .2rem;text-align:center;">';

          h+='</td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
    if(reflCells.length){
      h+='<div style="font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;">Reflexion</div>';

    }
  }
  h+='</div>';
  var el=document.getElementById(cid);if(el)el.innerHTML=h;

    if(q4)h+='<div class="qa-row"><div class="qa-q">¿Qué vas a jugar?</div><div class="qa-a">'+q4+'</div></div>';

  }else if(isGps){

      {id:'sueno',label:'Sueño visualizado',sub:'5 años máximo',color:'#f5f5f5',accent:'#aaa'},
      {id:'lp',label:'Objetivo Largo Plazo',sub:'2 años',color:'#dbeafe',accent:'#93c5fd'},
      {id:'mp',label:'Objetivo Mediano Plazo',sub:'1 año',color:'#fef9c3',accent:'#fcd34d'},
      {id:'cp',label:'Objetivo Corto Plazo',sub:'3 meses — Solo Rendimiento',color:'#dcfce7',accent:'#4ade80',sr:true}
    ];

    h+='<table style="width:100%;border-collapse:collapse;font-size:10px;">';
    h+='<thead><tr style="background:#f0f0f0;">';

    h+='<th style="padding:5px 7px;font-weight:700;text-align:center;border:1px solid #ddd;width:90px;">Tipo</th>';

        h+='<td style="padding:5px 7px;border:1px solid #ddd;white-space:pre-wrap;line-height:1.5;">'+pi+'</td>';

    var gridCells=resps.filter(function(r){return r.fid&&/^g_\d+_\d+$/.test(r.fid);});
    var reflCells=resps.filter(function(r){return r.fid&&!/^g_/.test(r.fid)&&r.fid!=='_startHour'&&r.fid!=='_endHour';});
    var days=['Lunes','Martes','Mierc.','Jueves','Viernes','Sabado','Domingo'];
    var sc={};
    gridCells.forEach(function(r){

    });

      h+='</tr></thead><tbody>';
      hrs.forEach(function(hr,hi){
        h+='<tr style="'+(hi%2===0?'background:#fafafa;':'')+'"><td class="hcol">'+hr+'</td>';
        days.forEach(function(d,di){

          if(val){
            var bg=clr?clr+'28':'#fff0ee';
            var fg=clr||'#c0392b';
            var bdr=clr?clr+'66':'#f5a89e';
            h+='<td><span style="background:'+bg+';color:'+fg+';border:1px solid '+bdr+';border-radius:3px;padding:2px 5px;display:inline-block;font-weight:600;font-size:9px;">'+val+'</span></td>';
          }else{
            h+='<td></td>';
          }
        });
        h+='</tr>';
      });
      h+='</tbody></table>';
    }
    reflCells.forEach(function(r){
      if(r.respuesta&&r.respuesta.trim())

    });

  }else{
    var hasAny=resps.some(function(r){return r.respuesta&&r.respuesta.trim();});
    if(hasAny){
      resps.forEach(function(r){
        if(r.respuesta&&r.respuesta.trim()&&r.fid&&!/^teosq_/.test(r.fid)){
          h+='<div class="qa-row"><div class="qa-q">'+(r.pregunta||'')+'</div><div class="qa-a">'+r.respuesta+'</div></div>';
        }
      });
    }else{
      h+='<div class="qa-row"><div class="qa-a" style="color:#aaa;">Ejercicio completado.</div></div>';
    }
  }

  h += pdfAttachHTML(resps);
  h+='</div>';
  return h;
}


function openPDF(title,bodyHtml){
  var doc='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>'+title+'</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>'+pdfStyles()+'</style></head><body>';
  doc+='<button class="print-btn no-print" onclick="window.print()">&#128424; Guardar como PDF</button>';
  doc+=bodyHtml;
  doc+='</body></html>';
  var blob=new Blob([doc],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(function(){URL.revokeObjectURL(url);},10000);
}

function buildTEOSQChartSVG(ego,tar){
  var W=380,H=220,ml=55,mr=20,mt=15,mb=65,ch=H-mt-mb,cw=W-ml-mr;
  function yPx(v){return mt+ch-(v/5)*ch;}
  function scoreColor(v){if(v<=2.9)return'#3B82F6';if(v<=4.2)return'#F59E0B';return'#22C55E';}
  var cx1=ml+cw/4,cx2=ml+cw*3/4,bw=70,s='';
  for(var i=0;i<=5;i++){var y=yPx(i);s+='<line x1="'+ml+'" y1="'+y+'" x2="'+(W-mr)+'" y2="'+y+'" stroke="rgba(255,255,255,.07)" stroke-width="1"/>';s+='<text x="'+(ml-6)+'" y="'+(y+4)+'" text-anchor="end" fill="rgba(238,239,243,.4)" font-family="Montserrat,sans-serif" font-size="9">'+i+'.00</text>';}
  s+='<line x1="'+ml+'" y1="'+mt+'" x2="'+ml+'" y2="'+(H-mb)+'" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>';
  s+='<line x1="'+ml+'" y1="'+(H-mb)+'" x2="'+(W-mr)+'" y2="'+(H-mb)+'" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>';
  function bar(cx,val,color,label){
    var bh=(val/5)*ch,bx=cx-bw/2,by=yPx(val);
    var r='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+color+'" opacity="0.85"/>';
    r+='<text x="'+cx+'" y="'+(by-6)+'" text-anchor="middle" fill="rgba(238,239,243,.9)" font-family="Montserrat,sans-serif" font-size="11" font-weight="700">'+val.toFixed(2)+'</text>';
    var ws=label.split(' '),l1=ws.slice(0,2).join(' '),l2=ws.slice(2).join(' ');
    r+='<text x="'+cx+'" y="'+(H-mb+16)+'" text-anchor="middle" fill="rgba(238,239,243,.6)" font-family="Montserrat,sans-serif" font-size="9" font-weight="700">'+l1+'</text>';
    if(l2)r+='<text x="'+cx+'" y="'+(H-mb+27)+'" text-anchor="middle" fill="rgba(238,239,243,.6)" font-family="Montserrat,sans-serif" font-size="9" font-weight="700">'+l2+'</text>';
    return r;
  }
  s+=bar(cx1,ego,scoreColor(ego),'ORIENTACION AL EGO');
  s+=bar(cx2,tar,scoreColor(tar),'ORIENTACION A LA TAREA');
  return s;
}

function pmtGetN(fid) {
  var el = document.getElementById('pmt-n-' + fid);
  if (!el || el.value === '') return null;
  var v = parseFloat(el.value);
  return (isNaN(v) || v < 1 || v > 10) ? null : v;
}

function pmtAvg(items) {
  var vals = items.map(function(it){ return pmtGetN(it.fid); }).filter(function(v){ return v !== null; });
  if (!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0) / vals.length;
}

function pmtCalcScores() {
  var cap1   = pmtAvg(PMT_ITEMS.sec1);
  var avg2a  = pmtAvg(PMT_ITEMS.sec2a);
  var avg2b  = pmtAvg(PMT_ITEMS.sec2b);
  var cap2   = (avg2a !== null && avg2b !== null) ? (avg2a + avg2b) / 2 : null;
  var global = (cap1 !== null && cap2 !== null) ? (cap1 + cap2) / 2 : null;
  return { cap1: cap1, cap2: cap2, global: global };
}

function pmtLvl(v) {
  if (v === null) return { lbl:'—', cls:'' };
  if (v < 4) return { lbl:'Bajo (' + v.toFixed(2) + ')', cls:'tlvl-low' };
  if (v < 7) return { lbl:'Medio (' + v.toFixed(2) + ')', cls:'tlvl-mid' };
  return { lbl:'Alto (' + v.toFixed(2) + ')', cls:'tlvl-hi' };
}

function pmtUpdateResults() {
  var s = pmtCalcScores();

  // --- Tab 1: mini-bars per item ---
  var all = PMT_ITEMS.sec1.concat(PMT_ITEMS.sec2a).concat(PMT_ITEMS.sec2b);
  all.forEach(function(it) {
    var v = pmtGetN(it.fid);
    var bar = document.getElementById('pmt-ibar-' + it.fid);
    var lbl = document.getElementById('pmt-ilbl-' + it.fid);
    if (bar) bar.style.width = (v !== null ? v * 10 : 0) + '%';
    if (lbl) {
      lbl.textContent = v !== null ? v : '—';
      var cls = 'pmt-item-score';
      if (v !== null) cls += v < 4 ? ' pmt-low' : v < 7 ? ' pmt-mid' : ' pmt-hi';
      lbl.className = cls;
    }
  });

  // Progress count
  var filled = all.filter(function(it){ return pmtGetN(it.fid) !== null; }).length;
  var pf = document.getElementById('ex-prog-pmt');
  var pt = document.getElementById('ex-prog-txt-pmt');
  if (pf) pf.style.width = Math.round(filled / all.length * 100) + '%';
  if (pt) pt.textContent = filled + ' de ' + all.length + ' ítems completados';

  // --- Tab 2: score cards ---
  function setCard(prefix, val) {
    var lvl = pmtLvl(val);
    var vEl = document.getElementById('pmt-v-' + prefix);
    var bEl = document.getElementById('pmt-b-' + prefix);
    var lEl = document.getElementById('pmt-l-' + prefix);
    if (vEl) { vEl.textContent = val !== null ? val.toFixed(2) : '—'; vEl.className = 'tq-sc-val ' + (val !== null ? (val < 4 ? 'pmt-low' : val < 7 ? 'pmt-mid' : 'pmt-hi') : ''); }
    if (bEl) { bEl.style.width = (val !== null ? val / 10 * 100 : 0) + '%'; bEl.style.background = val !== null ? (val < 4 ? '#60A5FA' : val < 7 ? '#FCD34D' : '#4ADE80') : 'var(--border)'; }
    if (lEl) { lEl.textContent = lvl.lbl; lEl.className = 'teosq-sc-lvl ' + lvl.cls; }
  }
  setCard('cap1', s.cap1);
  setCard('cap2', s.cap2);
  setCard('global', s.global);
}

    var savedJ = draft && draft[it.fid + '_j'] ? draft[it.fid + '_j'] : '';
    var barW   = savedN ? (parseFloat(savedN) * 10) + '%' : '0%';

}

function pmtAutoSave() {
  var all = PMT_ITEMS.sec1.concat(PMT_ITEMS.sec2a).concat(PMT_ITEMS.sec2b);
  var data = {};
  all.forEach(function(it) {
    var ni = document.getElementById('pmt-n-' + it.fid);
    var ji = document.getElementById('pmt-j-' + it.fid);
    if (ni && ni.value !== '') data[it.fid + '_n'] = ni.value;
    if (ji && ji.value.trim() !== '') data[it.fid + '_j'] = ji.value;
  });
  saveDraft(pmtLid, data);
  updateSaveStatus('Borrador guardado', 'rgba(238,239,243,.5)');
}

function pmtSubmit() {
  var s = pmtCalcScores();
  var user = USERS[S.user];
  var answers = [];
  var all = PMT_ITEMS.sec1.concat(PMT_ITEMS.sec2a).concat(PMT_ITEMS.sec2b);
  all.forEach(function(it) {
    var ni = document.getElementById('pmt-n-' + it.fid);
    var ji = document.getElementById('pmt-j-' + it.fid);
    answers.push({ fid: it.fid + '_n', pregunta: it.label + ' — nota', respuesta: ni ? (ni.value || '') : '' });
    answers.push({ fid: it.fid + '_j', pregunta: it.label + ' — por qué', respuesta: ji ? ji.value.trim() : '' });
  });
  if (s.cap1   !== null) answers.push({ fid:'pmt_cap1',   pregunta:'Capacidad de decisión',  respuesta: s.cap1.toFixed(2) });
  if (s.cap2   !== null) answers.push({ fid:'pmt_cap2',   pregunta:'Capacidad de volumen',   respuesta: s.cap2.toFixed(2) });
  if (s.global !== null) answers.push({ fid:'pmt_global', pregunta:'Puntaje Global Mindset', respuesta: s.global.toFixed(2) });

  var rec = { ts: Date.now(), fecha: new Date().toLocaleString('es-AR'),
    jugador: user.name, usuario: S.user,
    unidad: 'Unidad 1', ejercicio: 'Poker Mindset Test',
    lid: pmtLid, respuestas: answers };
  var saved = getLocalSubs();
  var idx = saved.findIndex(function(x){ return x.usuario === S.user && x.lid === pmtLid; });
  var isUpdate = idx >= 0;
  if (isUpdate) { rec.airtableId = saved[idx].airtableId; saved[idx] = rec; }
  else { saved.push(rec); }
    getAttachAnswers(lid).forEach(function(a){answers.push(a);});
  localStorage.setItem('pp_submissions', JSON.stringify(saved));
  markDoneL(pmtLid);
  fbSaveSubmission(S.user, pmtLid, rec);
  var btn = document.getElementById('btn-ex-' + pmtLid);
  if (btn) { btn.textContent = isUpdate ? 'Actualizar envío' : 'Enviar a Mauro'; btn.style.background = 'var(--green)'; btn.disabled = false; }
  updateSaveStatus('Enviado a Mauro', '#22C55E');
  showToast(isUpdate ? 'Respuestas actualizadas!' : 'Enviado a Mauro!');
  var unit = C.find(function(u){ return u.id === S.unitId; });
  if (unit) renderSidebar(unit);
  if (isUpdate && rec.airtableId) { updateAirtable(rec.airtableId, rec); }
  else { createAirtable(rec, function(id){ if(id){ var s2=getLocalSubs(); var i2=s2.findIndex(function(x){return x.usuario===S.user&&x.lid===pmtLid;}); if(i2>=0){s2[i2].airtableId=id;localStorage.setItem('pp_submissions',JSON.stringify(s2));} } }); }
}

function ipedIScore(n,v){
  var inv=[1,2,3,9,10,14,15,16,20,23,24,30,31,33,38];
  return inv.indexOf(n)>=0?(6-v):v;
}
function ipedCalcScores(){
  var scores={};
  IPED_SUBSCALES.forEach(function(sub){
    var total=0,filled=0;
    sub.items.forEach(function(n){var v=ipedAns[n]||0;if(v>0){total+=ipedIScore(n,v);filled++;}});
    scores[sub.id]=filled===6?total:null;
  });
  return scores;
}
function ipedLvl(score){
  if(score===null)return{lbl:'—',cls:'',color:'var(--dim)'};
  if(score<=20)return{lbl:'Bajo',cls:'tlvl-low',color:'#60A5FA'};
  if(score<=26)return{lbl:'Bueno',cls:'tlvl-mid',color:'#FCD34D'};
  return{lbl:'Excelente',cls:'tlvl-hi',color:'#4ADE80'};
}

function ipedUpdateResults(){
  var scores=ipedCalcScores();
  IPED_SUBSCALES.forEach(function(sub){
    var sc=scores[sub.id];
    var lv=ipedLvl(sc);
    var sv=document.getElementById('iped-sc-'+sub.id);
    if(sv){sv.textContent=sc!==null?sc:'—';sv.style.color=sc!==null?lv.color:'var(--dim)';}
    var le=document.getElementById('iped-lv-'+sub.id);
    if(le){le.textContent=lv.lbl;le.className='teosq-sc-lvl '+(sc!==null?lv.cls:'');}
    var bar=document.getElementById('iped-bar-'+sub.id);if(bar)bar.style.width=(sc!==null?(sc/30*100):0)+'%';
    var sv2=document.getElementById('iped-sv-'+sub.id);
    if(sv2){sv2.textContent=sc!==null?sc:'—';sv2.style.color=sc!==null?lv.color:'var(--dim)';}
    var sv3=document.getElementById('iped-sv2-'+sub.id);
    if(sv3){sv3.textContent=sc!==null?lv.lbl:'—';sv3.style.color=sc!==null?lv.color:'var(--dim)';}
    ['l','m','h'].forEach(function(k){
      var el=document.getElementById('iped-ic-'+sub.id+'-'+k);
      if(!el)return;
      el.textContent='◯';el.style.color='var(--dim)';el.style.fontWeight='400';el.style.fontSize='.9rem';
    });
    if(sc!==null){
      var ak=sc<=20?'l':sc<=26?'m':'h';
      var ae=document.getElementById('iped-ic-'+sub.id+'-'+ak);
      if(ae){ae.textContent='●';ae.style.color=lv.color;ae.style.fontWeight='800';ae.style.fontSize='1rem';}
    }
    var card=document.getElementById('iped-desc-'+sub.id);
    if(card){card.style.opacity=sc!==null?'1':'.55';card.style.borderColor=sc!==null?sub.color+'66':sub.color+'22';}
    var tag=document.getElementById('iped-tag-'+sub.id);
    if(tag&&sc!==null){
      tag.textContent=lv.lbl;
      tag.style.background=sc<=20?'rgba(96,165,250,.1)':sc<=26?'rgba(252,211,77,.1)':'rgba(74,222,128,.1)';
      tag.style.borderColor=lv.color+'55';tag.style.color=lv.color;
    }
  });
}

function ipedSubmit(){
  var scores=ipedCalcScores();
  var user=USERS[S.user];
  var answers=[];
  IPED_ITEMS.forEach(function(it){answers.push({fid:'iped_'+it.n,pregunta:it.t,respuesta:String(ipedAns[it.n]||0)});});
  IPED_SUBSCALES.forEach(function(sub){var sc=scores[sub.id];if(sc!==null)answers.push({fid:'iped_sc_'+sub.id,pregunta:sub.name,respuesta:String(sc)});});
  var rec={ts:Date.now(),fecha:new Date().toLocaleString('es-AR'),jugador:user.name,usuario:S.user,
    unidad:'Unidad 1',ejercicio:'IPED - Inventario Psicológico',lid:ipedLid,respuestas:answers};
  var saved=getLocalSubs();
  var idx=saved.findIndex(function(s){return s.usuario===S.user&&s.lid===ipedLid;});
  var isUpdate=idx>=0;
  if(isUpdate){rec.airtableId=saved[idx].airtableId;saved[idx]=rec;}else{saved.push(rec);}
    getAttachAnswers(lid).forEach(function(a){answers.push(a);});
  localStorage.setItem('pp_submissions',JSON.stringify(saved));
  markDoneL(ipedLid);fbSaveSubmission(S.user,ipedLid,rec);
  var btn=document.getElementById('iped-send-btn');
  if(btn){btn.textContent=isUpdate?'Actualizar envío':'Enviar a Mauro';btn.style.background='var(--green)';btn.disabled=false;}
  updateSaveStatus('Enviado a Mauro','#22C55E');

  var unit=C.find(function(u){return u.id===S.unitId;});if(unit)renderSidebar(unit);
  if(isUpdate&&rec.airtableId){updateAirtable(rec.airtableId,rec);}
  else{createAirtable(rec,function(id){if(id){var s2=getLocalSubs();var i2=s2.findIndex(function(s){return s.usuario===S.user&&s.lid===ipedLid;});if(i2>=0){s2[i2].airtableId=id;localStorage.setItem('pp_submissions',JSON.stringify(s2));}}});}
}

function gpsGetData(lid) {
  var draft = loadDraft(lid) || {};
  var sub = (getLocalSubs()||[]).find(function(s){return s.usuario===S.user&&s.lid===lid;});
  var data = {};
  if (Object.keys(draft).length) {
    data = draft;
  } else if (sub && sub.respuestas) {
    sub.respuestas.forEach(function(r){ if(r.fid) data[r.fid] = r.respuesta||''; });
  }
  return data;
}

function gpsRowCount(data, routeId) {
  // Find max index stored, default 3
  var max = 2;
  Object.keys(data).forEach(function(k) {
    var m = k.match(new RegExp('^gps_'+routeId+'_(\\d+)_'));
    if (m) max = Math.max(max, parseInt(m[1]));
  });
  return max + 1;
}

function gpsRowHTML(lid, row, idx, data, isNew) {
  var fBase = 'gps_'+row.id+'_'+idx+'_';

function gpsAddRow(lid, routeId) {
  var row = GPS_ROWS.find(function(r){return r.id===routeId;});
  if (!row) return;
  var tbody = document.getElementById('gps-body');
  var addRow = document.getElementById('gps-add-'+routeId);
  if (!tbody || !addRow) return;
  // Count existing rows for this route
  var existing = tbody.querySelectorAll('[data-route="'+routeId+'"]');
  var idx = existing.length;
  var data = gpsGetData(lid);
  var newTr = document.createElement('tbody');
  newTr.innerHTML = gpsRowHTML(lid, row, idx, data, true);
  var tr = newTr.firstChild;
  tbody.insertBefore(tr, addRow);
  gpsDraft(lid);
}

function gpsDraft(lid) {
  var data = {};
  document.querySelectorAll('[data-fid^="gps_"]').forEach(function(el) {
    if (el.value) data[el.getAttribute('data-fid')] = el.value;
  });
  saveDraft(lid, data);
  updateSaveStatus('Borrador guardado', 'rgba(238,239,243,.5)');
}

function gpsSubmit(lid) {
  var user = USERS[S.user];
  var answers = [];
  GPS_ROWS.forEach(function(row) {
    var rows = document.querySelectorAll('[data-route="'+row.id+'"]');
    rows.forEach(function(tr, i) {
      var fBase = 'gps_'+row.id+'_'+i+'_';
      ['obj','tipo','dl','pi'].forEach(function(f) {
        var el = tr.querySelector('[data-fid="'+fBase+f+'"]');
        var val = el ? el.value : (f==='tipo'&&row.soloRendimiento ? 'Rendimiento' : '');
        answers.push({ fid:fBase+f, pregunta:row.label+' #'+(i+1)+' — '+({obj:'Objetivo',tipo:'Tipo',dl:'Deadline',pi:'Punto intermedio'}[f]), respuesta:val });
      });
    });
  });
  var rec = { ts:Date.now(), fecha:new Date().toLocaleString('es-AR'),
    jugador:user.name, usuario:S.user,
    unidad:'Unidad 3', ejercicio:'GPS de Objetivos', lid:lid, respuestas:answers };
  var saved = getLocalSubs();
  var idx = saved.findIndex(function(s){ return s.usuario===S.user&&s.lid===lid; });
  var isUpdate = idx >= 0;
  if(isUpdate){rec.airtableId=saved[idx].airtableId;saved[idx]=rec;}else{saved.push(rec);}
    getAttachAnswers(lid).forEach(function(a){answers.push(a);});
  localStorage.setItem('pp_submissions', JSON.stringify(saved));
  markDoneL(lid); fbSaveSubmission(S.user, lid, rec);
  var btn = document.getElementById('btn-ex-'+lid);
  if(btn){btn.textContent=isUpdate?'Actualizar envío':'Enviar a Mauro';btn.style.background='var(--green)';}
  updateSaveStatus('Enviado a Mauro','#22C55E');
  showToast(isUpdate?'Respuestas actualizadas!':'Enviado a Mauro!');
  var unit = C.find(function(u){return u.id===S.unitId;});if(unit)renderSidebar(unit);
  if(isUpdate&&rec.airtableId){updateAirtable(rec.airtableId,rec);}
  else{createAirtable(rec,function(id){if(id){var s2=getLocalSubs();var i2=s2.findIndex(function(s){return s.usuario===S.user&&s.lid===lid;});if(i2>=0){s2[i2].airtableId=id;localStorage.setItem('pp_submissions',JSON.stringify(s2));}}});}
}

function clGetData(lid) {
  var draft = loadDraft(lid) || {};
  var sub = (getLocalSubs()||[]).find(function(s){return s.usuario===S.user&&s.lid===lid;});
  var data = {};
  if (Object.keys(draft).length) {
    data = draft;
  } else if (sub && sub.respuestas) {
    sub.respuestas.forEach(function(r){ if(r.fid) data[r.fid] = r.respuesta||''; });
  }
  return data;
}

function clParseItems(data, secId) {
  try { return JSON.parse(data['cl_'+secId] || '[]'); } catch(e) { return []; }
}

function clSaveDraft(lid) {
  var data = {};
  CL_SECTIONS.forEach(function(sec) {
    var items = [];
    var container = document.getElementById('cl-custom-'+sec.id);
    if (container) {
      container.querySelectorAll('.cl-item-row').forEach(function(row) {
        var cb = row.querySelector('.cl-cb');
        var txt = row.querySelector('.cl-txt');
        if (txt && txt.value.trim()) {
          items.push({ text: txt.value.trim(), checked: cb ? cb.checked : false });
        }
      });
    }
    data['cl_'+sec.id] = JSON.stringify(items);
    // examples
    var exBox = document.getElementById('cl-ex-'+sec.id);
    if (exBox) {
      var exStates = [];
      exBox.querySelectorAll('.cl-ex-cb').forEach(function(cb) { exStates.push(cb.checked); });
      data['cl_ex_'+sec.id] = JSON.stringify(exStates);
    }
  });
  var q4 = document.getElementById('cl-q4');
  if (q4) data['cl_q4'] = q4.value;
  saveDraft(lid, data);
  updateSaveStatus('Borrador guardado','rgba(238,239,243,.5)');
}

  localStorage.setItem('pp_submissions', JSON.stringify(saved));
  markDoneL(lid); fbSaveSubmission(S.user, lid, rec);
  var btn = document.getElementById('btn-ex-'+lid);
  if(btn){btn.textContent=isUpdate?'Actualizar envío':'Enviar a Mauro';btn.style.background='var(--green)';}
  updateSaveStatus('Enviado a Mauro','#22C55E');
  showToast(isUpdate?'Respuestas actualizadas!':'Enviado a Mauro!');
  var unit = C.find(function(u){return u.id===S.unitId;});if(unit)renderSidebar(unit);
  if(isUpdate&&rec.airtableId){updateAirtable(rec.airtableId,rec);}
  else{createAirtable(rec,function(id){if(id){var s2=getLocalSubs();var i2=s2.findIndex(function(s){return s.usuario===S.user&&s.lid===lid;});if(i2>=0){s2[i2].airtableId=id;localStorage.setItem('pp_submissions',JSON.stringify(s2));}}});}
}

/* ── CONCIENCIA ADMIN VIEW ─────────────────────── */
function renderConcienciaAdminView(ej, cid) {
  var resps = ej.respuestas || [];
  var data = {};
  resps.forEach(function(r){ if(r.fid) data[r.fid]=r.respuesta||''; });

  var ALL_QS = CON_QUESTIONS.concat([
    { fid:'cc_q9', n:'9️⃣', q:'¿Qué necesitás hacer para mejorar estos aspectos?' },
    { fid:'cc_q10', n:'🔟', q:'¿Podés solo o necesitás ayuda? ¿De quién?' }
  ]);

  var h = '<div style="padding:.75rem;display:flex;flex-direction:column;gap:1rem;">';

  ALL_QS.forEach(function(q) {
    var ans = data[q.fid] || '';
    if (!ans) return;
    h += '<div style="border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:.85rem;">';
    h += '<div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:.35rem;">'+q.n+' '+q.q+'</div>';
    h += '<div style="font-size:.84rem;line-height:1.65;white-space:pre-wrap;color:var(--text);">'+ans+'</div>';
    h += '</div>';
  });

  // Q8 checkboxes
  var sel = [];
  try { sel = JSON.parse(data['cc_q8'] || '[]'); } catch(e) {}
  if (sel.length) {
    h += '<div style="border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:.85rem;">';
    h += '<div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:.5rem;">8️⃣ Ítems seleccionados:</div>';
    sel.forEach(function(idx) {
      if (CON_ITEMS[idx]) {
        h += '<div style="display:flex;align-items:center;gap:.5rem;font-size:.82rem;margin-bottom:.3rem;">';
        h += '<span style="color:var(--red);">☑</span><span>'+CON_ITEMS[idx]+'</span>';
        h += '</div>';
      }
    });
    h += '</div>';
  }

  // Extra
  var extra = data['cc_extra'] || '';
  if (extra) {
    h += '<div>';
    h += '<div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:.35rem;">✏️ Agregado libre:</div>';
    h += '<div style="font-size:.84rem;line-height:1.65;white-space:pre-wrap;color:var(--text);">'+extra+'</div>';
    h += '</div>';
  }

  h += '</div>';
    h += adminAttachHTML(ej.respuestas||[]);
  var el = document.getElementById(cid);
  if(el) el.innerHTML = h;
}
